<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>💰 發財強勢股精算系統 (自動化版)</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; background: #0d0f14; font-family: -apple-system, system-ui, sans-serif; color: #e8eaf0; }
        .container { min-height: 100vh; padding: 24px 16px; box-sizing: border-box; }
        .header-tag { display: inline-block; font-size: 10px; letter-spacing: 3px; color: #ff6b9d; border: 1px solid #ff6b9d; padding: 4px 16px; border-radius: 20px; margin-bottom: 12px; }
        .h1 { font-size: 28px; font-weight: 900; margin-bottom: 24px; text-align: center; color: #fff; }
        .card { background: #1c2030; border: 1px solid #2a2f3e; border-radius: 20px; padding: 20px; margin-bottom: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .input-title { font-size: 14px; color: #ff6b9d; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; }
        input { width: 100%; background: #161921; border: 1px solid #2a2f3e; border-radius: 12px; padding: 14px; color: #fff; margin-bottom: 12px; box-sizing: border-box; outline: none; font-size: 16px; font-weight: 600; }
        .fetch-btn { width: 100%; background: linear-gradient(135deg, #ff6b9d 0%, #a855f7 100%); border: none; border-radius: 12px; color: #fff; padding: 16px; font-weight: 800; cursor: pointer; margin-top: 8px; font-size: 16px; transition: 0.2s; }
        .fetch-btn:active { transform: scale(0.97); opacity: 0.9; }
        .fetch-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .result-row { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .label { color: #9ca3af; font-size: 15px; }
        .val { font-weight: 700; font-size: 18px; }
        .badge { font-size: 11px; padding: 3px 8px; border-radius: 6px; margin-left: 10px; font-weight: 800; text-transform: uppercase; }
        .status-up { background: rgba(74, 222, 128, 0.15); color: #4ade80; border: 1px solid rgba(74, 222, 128, 0.3); }
        .status-wait { background: rgba(156, 163, 175, 0.1); color: #9ca3af; border: 1px solid rgba(156, 163, 175, 0.2); }
        .loading-text { font-size: 12px; color: #9ca3af; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [symbol, setSymbol] = useState("");
            const [price, setPrice] = useState("");
            const [cost, setCost] = useState("");
            const [loading, setLoading] = useState(false);

            const fetchStockData = async () => {
                if (!symbol || symbol.length < 4) { alert("請輸入 4 位數股票代號"); return; }
                setLoading(true);
                try {
                    // 抓取近 40 天數據確保計算波段
                    const start = new Date(Date.now() - 40 * 86400000).toISOString().split('T')[0];
                    const url = `https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockPrice&data_id=${symbol}&start_date=${start}`;
                    const res = await fetch(url);
                    const json = await res.json();
                    
                    if (json.data && json.data.length > 0) {
                        const latest = json.data[json.data.length - 1];
                        setPrice(String(latest.close));
                    } else { alert("查無此股票數據"); }
                } catch (e) { alert("網路連線異常"); }
                setLoading(false);
            };

            const renderAnalysis = () => {
                const p = parseFloat(price);
                if (isNaN(p)) return null;

                const base = cost ? parseFloat(cost) : p;
                const levels = [
                    { n: "發動點", v: base * 1.04, c: "#60a5fa" },
                    { n: "休息區", v: base * 1.20, c: "#fbbf24" },
                    { n: "目標區", v: base * 1.40, c: "#4ade80" },
                    { n: "韭菜區", v: base * 1.70, c: "#f87171" }
                ];

                return (
                    <div className="card" style={{marginTop: 20}}>
                        <div style={{fontSize: 13, color: '#9ca3af', marginBottom: 15, borderLeft: '3px solid #ff6b9d', paddingLeft: 10}}>
                            基準成本：${base.toFixed(2)}
                        </div>
                        {levels.map(l => (
                            <div key={l.n} className="result-row">
                                <div style={{display:'flex', alignItems:'center'}}>
                                    <span className="label">{l.n}</span>
                                    <span className={`badge ${p >= l.v ? 'status-up' : 'status-wait'}`}>
                                        {p >= l.v ? "已突破" : "待啟動"}
                                    </span>
                                </div>
                                <span className="val" style={{color: l.c}}>${l.v.toFixed(2)}</span>
                            </div>
                        ))}
                    </div>
                );
            };

            return (
                <div className="container">
                    <div style={{textAlign: "center", marginBottom: 30}}>
                        <div className="header-tag">168 FINANCE LAB</div>
                        <div className="h1">發財強勢股精算系統</div>
                    </div>

                    <div className="card">
                        <div className="input-title">📊 核心數據輸入</div>
                        <input 
                            placeholder="股票名稱 / 代號 (例: 2330)" 
                            value={symbol} 
                            onChange={e => setSymbol(e.target.value)} 
                        />
                        <button className="fetch-btn" onClick={fetchStockData} disabled={loading}>
                            {loading ? "連線抓取中..." : "🚀 開始發財分析"}
                        </button>
                        
                        <div style={{marginTop: 20, display: 'flex', gap: '12px'}}>
                            <div style={{flex: 1}}>
                                <div style={{fontSize: 11, color: '#9ca3af', marginBottom: 6}}>當前現價</div>
                                <input 
                                    type="number" 
                                    placeholder="必填" 
                                    value={price} 
                                    onChange={e => setPrice(e.target.value)} 
                                />
                            </div>
                            <div style={{flex: 1}}>
                                <div style={{fontSize: 11, color: '#9ca3af', marginBottom: 6}}>主力成本</div>
                                <input 
                                    type="number" 
                                    placeholder="選填" 
                                    value={cost} 
                                    onChange={e => setCost(e.target.value)} 
                                />
                            </div>
                        </div>
                    </div>

                    {renderAnalysis()}
                    
                    {!price && !loading && (
                        <div className="loading-text">請輸入代號並按下按鈕抓取即時數據</div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
