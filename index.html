<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐰 兔兔版強勢股估算工具</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; background-color: #0d0f14; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: #e8eaf0; }
        .container { max-width: 500px; margin: 0 auto; padding: 20px; }
        .card { background: #1c2030; border: 1px solid #2a2f3e; borderRadius: 16px; padding: 20px; margin-bottom: 16px; border-radius: 16px; }
        .title { color: #ff6b9d; font-size: 13px; font-weight: 700; letter-spacing: 1px; margin-bottom: 15px; border-bottom: 1px solid #2a2f3e; padding-bottom: 10px; }
        input { width: 100%; background: #161921; border: 1px solid #2a2f3e; border-radius: 10px; color: #fff; padding: 12px; margin-bottom: 12px; box-sizing: border-box; font-size: 16px; outline: none; }
        button { width: 100%; background: linear-gradient(135deg, #ff6b9d, #a78bfa); border: none; border-radius: 14px; color: #fff; padding: 16px; font-size: 16px; font-weight: 700; cursor: pointer; }
        .result-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .label { color: #9ca3af; font-size: 14px; }
        .value { color: #4ade80; font-weight: 700; font-family: monospace; }
        .header { text-align: center; margin-bottom: 30px; }
        .badge { background: rgba(255,107,157,0.1); color: #ff6b9d; padding: 4px 12px; border-radius: 20px; font-size: 11px; border: 1px solid #ff6b9d; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [stock, setStock] = useState("");
            const [price, setPrice] = useState("");
            const [cost, setCost] = useState("");
            const [result, setResult] = useState(null);

            const calculate = () => {
                const c = parseFloat(cost);
                if (!c) return;

                setResult({
                    start: (c * 1.04).toFixed(2),  // 發動點
                    wave1: (c * 1.2).toFixed(2),   // 第一波高點休息區
                    wave2: (c * 1.4).toFixed(2),   // 第二波高點
                    peak: (c * 1.7).toFixed(2)     // 終極韭菜區
                });
            };

            return (
                <div className="container">
                    <div className="header">
                        <span className="badge">兔兔版強勢股估算法</span>
                        <h1 style={{marginTop: '10px', fontSize: '24px'}}>核心價位計算機</h1>
                    </div>

                    <div className="card">
                        <div className="title">輸入數據</div>
                        <input placeholder="股票名稱 / 代號" value={stock} onChange={e => setStock(e.target.value)} />
                        <input type="number" placeholder="當前現價" value={price} onChange={e => setPrice(e.target.value)} />
                        <input type="number" placeholder="法人 / 主力成本" value={cost} onChange={e => setCost(e.target.value)} />
                        <button onClick={calculate}>開始精算位階</button>
                    </div>

                    {result && (
                        <div className="card">
                            <div className="title">🔍 計算結果 ({stock || "該股"})</div>
                            <div className="result-item">
                                <span className="label">發動點 (1.04x)</span>
                                <span className="value">${result.start}</span>
                            </div>
                            <div className="result-item">
                                <span className="label">第一波休息區 (1.2x)</span>
                                <span className="value">${result.wave1}</span>
                            </div>
                            <div className="result-item">
                                <span className="label">第二波高點 (1.4x)</span>
                                <span className="value">${result.wave2}</span>
                            </div>
                            <div className="result-item" style={{borderBottom: 'none'}}>
                                <span className="label" style={{color: '#f87171'}}>終極韭菜區 (1.7x)</span>
                                <span className="value" style={{color: '#f87171'}}>${result.peak}</span>
                            </div>
                            <div style={{marginTop: '15px', fontSize: '12px', color: '#6b7280', textAlign: 'center'}}>
                                * 請嚴格遵守估算法則，位階僅供參考
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
