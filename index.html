<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fortune Stock FinMind 版 4.0</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0d11;
    --surface: #15181f;
    --card: #1c2029;
    --border: #2d323d;
    --accent-gold: #f5c842;
    --accent-purple: #b48eff;
    --accent-green: #4ade80;
    --accent-red: #f87171;
    --text-main: #f5f5f5;
    --text-muted: #8a8f9d;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text-main); font-family: 'Noto Sans TC', sans-serif; padding: 20px 15px 80px; }
  .app-header { text-align: center; margin-bottom: 20px; }
  .app-header h1 { font-size: 24px; font-weight: 900; background: linear-gradient(to right, #fff, var(--accent-gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .app-header p { font-size: 11px; color: var(--text-muted); letter-spacing: 1px; }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 20px; margin-bottom: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
  .card-title { font-size: 13px; font-weight: 700; color: var(--accent-gold); margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
  
  .input-label { display: block; font-size: 11px; color: var(--text-muted); margin-bottom: 6px; }
  input { background: #0b0d11; border: 1px solid var(--border); border-radius: 10px; color: var(--accent-gold); font-family: 'DM Mono', monospace; font-size: 16px; padding: 12px; width: 100%; outline: none; transition: 0.3s; }
  input:focus { border-color: var(--accent-gold); box-shadow: 0 0 10px rgba(245,200,66,0.1); }
  
  .btn-fetch { width: 100%; background: #1a1e26; border: 1px dashed var(--accent-gold); border-radius: 12px; color: var(--accent-gold); padding: 12px; font-size: 13px; font-weight: 700; cursor: pointer; margin: 15px 0; transition: 0.3s; }
  .btn-analyze { width: 100%; background: linear-gradient(135deg, #f5c842, #d4a72d); border: none; border-radius: 14px; color: #000; padding: 16px; font-size: 16px; font-weight: 900; letter-spacing: 2px; cursor: pointer; }

  .status-box { text-align: center; padding: 25px; border-radius: 20px; border: 1px solid var(--accent-gold); background: radial-gradient(circle at top, #252a36, #1c2029); margin-bottom: 20px; }
  
  /* 分數儀表板 */
  .score-circle { width: 80px; height: 80px; border-radius: 50%; border: 5px solid var(--accent-gold); margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 900; color: var(--accent-gold); }

  .fib-table { width: 100%; border-collapse: collapse; font-family: 'DM Mono', monospace; font-size: 13px; }
  .fib-table tr { border-bottom: 1px solid var(--border); }
  .fib-table td { padding: 14px 8px; vertical-align: middle; }
  
  .strat-tag { font-size: 9px; padding: 2px 6px; border-radius: 4px; display: inline-block; margin-top: 4px; font-weight: bold; }
  .tag-entry { background: rgba(74,222,128,0.15); color: #4ade80; border: 0.5px solid #4ade80; }
  .tag-hold { background: rgba(245,200,66,0.15); color: #f5c842; border: 0.5px solid #f5c842; }
  .tag-exit { background: rgba(248,113,113,0.15); color: #f87171; border: 0.5px solid #f87171; }

  .target-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; text-align: center; }
  .target-item { background: #0b0d11; padding: 12px 5px; border-radius: 12px; border: 1px solid var(--border); }
  .target-label { font-size: 10px; color: var(--text-muted); margin-bottom: 4px; }
  .target-val { font-size: 14px; font-weight: 700; color: var(--accent-gold); }
</style>
</head>
<body>

<div class="app-header">
  <p>STRATEGIC TRADING SYSTEM</p>
  <h1>發財強勢股精算 4.0</h1>
</div>

<div class="card">
  <div class="card-title">📡 數據自動同步 (FinMind)</div>
  <input type="text" id="ticker" placeholder="輸入 4 位台股代號 (如 2330)">
  <button class="btn-fetch" id="btnFetch" onclick="fetchFinMindData()">📡 啟動 AI 數據同步</button>

  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
    <div><label class="input-label">當前現價</label><input type="number" id="price" step="0.01"></div>
    <div><label class="input-label">法人成本</label><input type="number" id="cost" step="0.01"></div>
  </div>
  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 12px;">
    <div><label class="input-label">三月低點</label><input type="number" id="low" step="0.01"></div>
    <div><label class="input-label">三月高點</label><input type="number" id="high" step="0.01"></div>
  </div>
  <input type="hidden" id="atr_val">

  <button class="btn-analyze" style="margin-top:20px;" onclick="runAnalysis()">🧧 開始高勝率精算</button>
</div>

<div id="analysisResult" style="display:none;">
  <div class="status-box" id="statusBox"></div>

  <div class="card">
    <div class="card-title">📐 斐波那契過濾器 (Fib Analysis)</div>
    <table class="fib-table" id="fibTable"></table>
  </div>

  <div class="card">
    <div class="card-title">🌊 法人波浪擴展目標</div>
    <div class="target-grid" id="waveTargets"></div>
  </div>
</div>

<script>
const FINMIND_TOKEN = "eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJ1c2VyX2lkIjoiaHVhbmc4MDY3NiIsImVtYWlsIjoidzgwMDY3NkBnbWFpbC5jb20ifQ.k7BlAxav_GxT_tchaXAyuDafq_hIV01eUSzk2H_cZBQ";

async function fetchFinMindData() {
    const ticker = document.getElementById('ticker').value.trim();
    if (!ticker) return alert('請輸入股票代號');
    const btn = document.getElementById('btnFetch');
    btn.textContent = '🚀 同步中...';
    const endDate = new Date().toISOString().split('T')[0];
    const startDate = new Date(new Date().setDate(new Date().getDate() - 100)).toISOString().split('T')[0];

    try {
        const url = `https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockPrice&data_id=${ticker}&start_date=${startDate}&end_date=${endDate}&token=${FINMIND_TOKEN}`;
        const response = await fetch(url);
        const json = await response.json();
        const data = json.data;
        const closes = data.map(d => d.close);
        
        let trs = [];
        for(let i=1; i<data.length; i++) {
            const tr = Math.max(data[i].max-data[i].min, Math.abs(data[i].max-data[i-1].close), Math.abs(data[i].min-data[i-1].close));
            trs.push(tr);
        }
        
        document.getElementById('price').value = closes[closes.length - 1];
        document.getElementById('high').value = Math.max(...data.slice(-60).map(d => d.max)).toFixed(2);
        document.getElementById('low').value = Math.min(...data.slice(-60).map(d => d.min)).toFixed(2);
        document.getElementById('atr_val').value = trs.slice(-20).reduce((a,b)=>a+b,0)/20;
        btn.textContent = '✅ 同步完成';
    } catch (e) { alert('抓取失敗'); btn.textContent = '❌ 失敗'; }
}

function runAnalysis() {
    const p = parseFloat(document.getElementById('price').value);
    const hi = parseFloat(document.getElementById('high').value);
    const lo = parseFloat(document.getElementById('low').value);
    const cost = parseFloat(document.getElementById('cost').value);
    const atr = parseFloat(document.getElementById('atr_val').value) || p * 0.03;
    
    if (!p || !hi || !lo) return alert('數據不足');
    document.getElementById('analysisResult').style.display = 'block';

    const range = hi - lo;
    const fib0618 = lo + range * 0.618;
    const fib0786 = lo + range * 0.786;
    
    // --- 勝率邏輯計算 ---
    let score = 0;
    let signals = [];
    if (p > cost) { score += 40; signals.push("✅ 站上法人成本"); }
    if (Math.abs(p - fib0618) / fib0618 < 0.02) { score += 40; signals.push("✅ 黃金共振支撐"); }
    
    const risk = p - Math.min(fib0786, p - (atr * 1.5));
    const reward = hi - p;
    const rr = reward / risk;
    if (rr > 1.8) { score += 20; signals.push("✅ 風報比優勢"); }

    // --- 渲染 Fib 表格 ---
    const fibRatios = [
        { r: 0.382, l: "0.382", role: "強勢防護", strat: "跌破轉弱", tag: "tag-exit" },
        { r: 0.5,   l: "0.500", role: "多空分界", strat: "關鍵觀察", tag: "tag-hold" },
        { r: 0.618, l: "0.618", role: "發財位", strat: "黃金進場", tag: "tag-entry" },
        { r: 0.786, l: "0.786", role: "終極防線", strat: "絕對止損", tag: "tag-exit" },
        { r: 1.272, l: "1.272", role: "噴發首位", strat: "分批停利", tag: "tag-exit" },
        { r: 1.618, l: "1.618", role: "終極目標", strat: "獲利出場", tag: "tag-exit" }
    ];

    let fibHTML = "";
    fibRatios.forEach(f => {
        const val = lo + range * f.r;
        const isNear = Math.abs(p - val) / p < 0.015;
        fibHTML += `<tr><td><span style="font-size:10px; color:var(--text-muted)">${f.l}</span><br><b>${f.role}</b><br><span class="strat-tag ${f.tag}">${f.strat}</span></td><td style="font-weight:700;">$${val.toFixed(2)}</td><td style="color:${isNear ? 'var(--accent-green)' : (p > val ? 'var(--accent-red)' : 'var(--text-muted)')}">${isNear ? '🎯' : (p > val ? '▲' : '▼')}</td></tr>`;
    });
    document.getElementById('fibTable').innerHTML = fibHTML;

    // --- 渲染狀態盒 ---
    const scoreColor = score >= 80 ? 'var(--accent-green)' : (score >= 40 ? 'var(--accent-gold)' : 'var(--accent-red)');
    document.getElementById('statusBox').innerHTML = `
        <div class="score-circle" style="border-color:${scoreColor}; color:${scoreColor}">${score}</div>
        <div style="font-size:18px; font-weight:900; margin-bottom:10px; color:${scoreColor}">${score >= 80 ? '🔥 極致高勝率' : (score >= 40 ? '⚖️ 穩健觀察' : '⚠️ 風險較高')}</div>
        <div style="font-size:12px; color:var(--text-muted); margin-bottom:15px;">${signals.join(' | ')}</div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; text-align:left;">
            <div class="target-item"><div class="target-label">策略停損 (0.786/ATR)</div><div class="target-val" style="color:var(--accent-red)">$${Math.min(fib0786, p - (atr * 1.5)).toFixed(2)}</div></div>
            <div class="target-item"><div class="target-label">預期風報比</div><div class="target-val">${rr.toFixed(1)}</div></div>
        </div>
    `;
    document.getElementById('statusBox').style.borderColor = scoreColor;

    // --- 法人目標 ---
    if(cost) {
        document.getElementById('waveTargets').innerHTML = `
            <div class="target-item"><div class="target-label">突破點(1.04)</div><div class="target-val">$${(cost*1.04).toFixed(2)}</div></div>
            <div class="target-item"><div class="target-label">目標一(1.20)</div><div class="target-val" style="color:var(--accent-purple)">$${(cost*1.2).toFixed(2)}</div></div>
            <div class="target-item"><div class="target-label">目標二(1.40)</div><div class="target-val" style="color:var(--accent-red)">$${(cost*1.4).toFixed(2)}</div></div>`;
    }
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}
</script>
</body>
</html>
