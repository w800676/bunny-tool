<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>發財強勢股精算系統｜Fortune Pro</title>
<style>
:root {
  /* 顏色全部改為發財金與暗黑色調，維持原始兔子系統變數名稱 */
  --bg:#0a0c10; --surface:#12151c; --card:#181c26; --border:#3d341a;
  --gold:#f5c842; --green:#4ade80; --red:#f87171; 
  --text:#f5c842; /* 字體顏色改成黃色 */
  --muted:#857f61; --dim:#a39e7e;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;min-height:100vh;padding:20px 16px 60px;}
.header{text-align:center;margin-bottom:28px;}
.tag{display:inline-block;font-size:11px;letter-spacing:3px;color:var(--gold);border:1px solid var(--gold);padding:4px 14px;border-radius:20px;margin-bottom:12px;text-transform:uppercase;}
h1{font-size:28px;font-weight:900;color:var(--gold);margin-bottom:4px;}
.section{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:14px;}
.section-title{font-size:13px;font-weight:700;color:var(--gold);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.section-title::after{content:'';flex:1;height:1px;background:var(--border);}
.input-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
input{background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--gold);font-family:monospace;font-size:16px;padding:12px;outline:none;width:100%;}
.btn-main{width:100%;background:var(--gold);border:none;border-radius:14px;color:#000;font-size:18px;font-weight:900;padding:18px;cursor:pointer;margin-top:12px;letter-spacing:4px;}
.fib-table{width:100%;border-collapse:separate;border-spacing:0 4px;font-family:monospace;font-size:13px;}
.fib-table td{padding:12px 10px;background:var(--surface);}
.signal-banner{padding:15px;border-radius:12px;margin-bottom:15px;text-align:center;font-weight:bold;border:1px solid var(--gold);}
#results{display:none;}
</style>
</head>
<body>

<div class="header">
  <div class="tag">Fortune Pro</div>
  <h1>發財強勢股精算系統</h1>
  <p style="color:var(--muted); font-size:12px;">維持原始架構 · 強化進出場判斷</p>
</div>

<div class="section">
  <div class="section-title">📊 數據輸入</div>
  <div class="input-grid">
    <input type="number" id="price" placeholder="當前現價" step="0.01">
    <input type="number" id="cost" placeholder="法人成本" step="0.01">
    <input type="number" id="fibLow" placeholder="90D 最低" step="0.01">
    <input type="number" id="fibHigh" placeholder="90D 最高" step="0.01">
  </div>
</div>

<button class="btn-main" onclick="runAnalysis()">🧧 產出精算判斷</button>

<div id="results">
  <div id="decisionArea"></div>

  <div class="section">
    <div class="section-title">📐 斐波那契位階判定</div>
    <table class="fib-table" id="fibTable"></table>
  </div>

  <div class="section" id="waveArea"></div>
</div>

<script>
function runAnalysis() {
    const p = parseFloat(document.getElementById('price').value);
    const hi = parseFloat(document.getElementById('fibHigh').value);
    const lo = parseFloat(document.getElementById('fibLow').value);
    const c = parseFloat(document.getElementById('cost').value);

    if (!p || !hi || !lo || !c) return alert("請完整輸入數據");

    document.getElementById('results').style.display = 'block';
    const range = hi - lo;

    // 1. 斐波那契位階與判定
    const levels = [
        {r: 0, l: '起漲低點(0%)', act: '支撐'},
        {r: 0.382, l: '強勢回調(38.2%)', act: '進場'},
        {r: 0.5, l: '多空分界(50%)', act: '觀察'},
        {r: 0.618, l: '黃金分割(61.8%)', act: '進場'},
        {r: 0.786, l: '深層回測(78.6%)', act: '防守'},
        {r: 1, l: '前波高點(100%)', act: '壓力'}
    ];

    let fibHTML = `<tr><th>位階</th><th>價格</th><th>判定</th></tr>`;
    levels.forEach(lvl => {
        const val = +(lo + range * lvl.r).toFixed(2);
        const near = Math.abs(p - val) / p < 0.015;
        fibHTML += `<tr>
            <td>${lvl.l}</td>
            <td>$${val}</td>
            <td style="color:${near ? 'var(--green)' : 'var(--dim)'}">${near ? '⭐ 關鍵' + lvl.act : '--'}</td>
        </tr>`;
    });
    document.getElementById('fibTable').innerHTML = fibHTML;

    // 2. 波浪進出場邏輯
    const bP = (c * 1.04).toFixed(2);
    const t1 = (c * 1.2).toFixed(2);
    const t2 = (c * 1.4).toFixed(2);

    let decision = "";
    let color = "var(--gold)";

    if (p >= bP && p < t1) {
        decision = "🚀 進場信號：已突破 1.04 成本位，主升段啟動！";
        color = "var(--green)";
    } else if (p >= t2) {
        decision = "💰 出場信號：已抵達 1.4 滿足位，建議分批獲利。";
        color = "var(--red)";
    } else if (p >= t1) {
        decision = "📈 持股信號：抵達 1.2 關卡，朝 1.4 目標前進。";
    } else {
        decision = "⏳ 觀望信號：尚未突破 1.04 啟動點，耐心等待。";
    }

    document.getElementById('decisionArea').innerHTML = `
        <div class="signal-banner" style="color:${color}; border-color:${color}">
            ${decision}
        </div>
    `;

    document.getElementById('waveArea').innerHTML = `
        <div class="section-title">🌊 波浪精算目標</div>
        <div style="font-size:13px; line-height:2;">
            • 啟動買點 (1.04)：$${bP}<br>
            • 目標一 (1.20)：$${t1}<br>
            • 目標二 (1.40)：$${t2}
        </div>
    `;
}
</script>
</body>
</html>
