<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fortune Strategic 5.0 - 買紅賣綠點亮版</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0d11;
    --surface: #15181f;
    --card: #1c2029;
    --border: #2d323d;
    --accent-gold: #f5c842;
    --accent-green: #4ade80; /* 賣點顏色 */
    --accent-red: #f87171;   /* 買點顏色 */
    --text-main: #f5f5f5;
    --text-muted: #8a8f9d;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text-main); font-family: 'Noto Sans TC', sans-serif; padding: 20px 15px 80px; }
  
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 20px; margin-bottom: 16px; }
  .card-title { font-size: 13px; font-weight: 700; color: var(--accent-gold); margin-bottom: 15px; }
  
  input { background: #0b0d11; border: 1px solid var(--border); border-radius: 10px; color: var(--accent-gold); font-family: 'DM Mono', monospace; font-size: 16px; padding: 12px; width: 100%; outline: none; margin-bottom: 10px; }
  .btn-analyze { width: 100%; background: linear-gradient(135deg, #f5c842, #d4a72d); border: none; border-radius: 14px; color: #000; padding: 16px; font-size: 16px; font-weight: 900; cursor: pointer; }

  /* 狀態儀表板 */
  .status-box { text-align: center; padding: 25px; border-radius: 24px; border: 1px solid var(--accent-gold); background: radial-gradient(circle at top, #252a36, #1c2029); margin-bottom: 20px; }
  .score-circle { width: 85px; height: 85px; border-radius: 50%; border: 6px solid var(--accent-gold); margin: 0 auto 12px; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 900; }

  /* 點亮效果樣式 */
  .active-buy { background: rgba(248, 113, 113, 0.15) !important; border-left: 4px solid var(--accent-red) !important; }
  .active-sell { background: rgba(74, 222, 128, 0.15) !important; border-left: 4px solid var(--accent-green) !important; }

  .fib-table { width: 100%; border-collapse: collapse; font-family: 'DM Mono', monospace; }
  .fib-table td { padding: 15px 10px; border-bottom: 1px solid var(--border); }
  
  .target-tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; display: inline-block; margin-top: 5px; }
  .tag-buy { background: var(--accent-red); color: #fff; }
  .tag-sell { background: var(--accent-green); color: #000; }

  .rr-report { margin-top: 15px; padding: 15px; border-radius: 12px; background: rgba(0,0,0,0.3); text-align: left; }
  .rr-item { font-size: 12px; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
</style>
</head>
<body>

<div class="card">
  <div class="card-title">⚙️ 策略數據輸入 (買紅賣綠版)</div>
  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
    <div><label style="font-size:11px; color:var(--text-muted)">目前現價</label><input type="number" id="price" step="0.01"></div>
    <div><label style="font-size:11px; color:var(--text-muted)">法人成本</label><input type="number" id="cost" step="0.01"></div>
  </div>
  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
    <div><label style="font-size:11px; color:var(--text-muted)">波段高點</label><input type="number" id="high" step="0.01"></div>
    <div><label style="font-size:11px; color:var(--text-muted)">波段低點</label><input type="number" id="low" step="0.01"></div>
  </div>
  <button class="btn-analyze" onclick="runAnalysis()">🧧 點亮買賣關鍵位</button>
</div>

<div id="resultArea" style="display:none;">
  <div class="status-box" id="statusBox"></div>
  <div class="card">
    <div class="card-title">📐 雙向斐波那契追蹤</div>
    <table class="fib-table" id="fibTable"></table>
  </div>
</div>

<script>
function runAnalysis() {
    const p = parseFloat(document.getElementById('price').value);
    const hi = parseFloat(document.getElementById('high').value);
    const lo = parseFloat(document.getElementById('low').value);
    const cost = parseFloat(document.getElementById('cost').value);
    
    if (!p || !hi || !lo) return alert('數據不完整');
    document.getElementById('resultArea').style.display = 'block';

    const range = hi - lo;
    // 將 0.786 設定為計算風險的參考點 (降低虧損用)
    const stopLossRef = lo + range * 0.786; 
    const rr = (hi - p) / (p - stopLossRef);

    // 位階定義：包含向上擴展與向下回測
    const levels = [
        { r: 1.618, label: "1.618 終極獲利區", type: "sell" },
        { r: 1.382, label: "1.382 波段壓力位", type: "sell" },
        { r: 0.786, label: "0.786 高位減碼區", type: "sell" }, // 你的減碼壓力位
        { r: 0.618, label: "0.618 黃金買點區", type: "buy" },  // 你的高勝率進場
        { r: 0.500, label: "0.500 多空平衡點", type: "buy" }
    ];

    let fibHTML = "";
    let activeSignal = "⏳ 觀察中";
    let signalColor = "var(--accent-gold)";

    levels.sort((a,b) => b.r - a.r).forEach(f => {
        const val = lo + (range * f.r);
        const isActive = Math.abs(p - val) / val < 0.02; // 2% 誤差內點亮
        
        let rowClass = "";
        let tag = "";

        if (isActive) {
            if (f.type === "buy") {
                rowClass = "active-buy";
                tag = `<br><span class="target-tag tag-buy">🔴 買點點亮：支撐確認</span>`;
                activeSignal = "🎯 買點觸發：建議進場";
                signalColor = "var(--accent-red)";
            } else {
                rowClass = "active-sell";
                tag = `<br><span class="target-tag tag-sell">🟢 賣點點亮：建議減碼</span>`;
                activeSignal = "🚀 壓力觸及：獲利落袋";
                signalColor = "var(--accent-green)";
            }
        }

        fibHTML += `
            <tr class="${rowClass}">
                <td>
                    <span style="font-size:10px; color:var(--text-muted)">Fib ${f.r.toFixed(3)}</span><br>
                    <b>${f.label}</b>${tag}
                </td>
                <td style="font-weight:700; text-align:right;">$${val.toFixed(2)}</td>
                <td style="text-align:right;">${p > val ? '▲' : '▼'}</td>
            </tr>`;
    });

    document.getElementById('fibTable').innerHTML = fibHTML;

    // 風報比顏色與文字邏輯
    let rrText = "❌ 低於 1.2：不划算";
    let rrColor = "var(--accent-red)";
    if (rr >= 3.0) { rrText = "💎 3.0 以上：極佳"; rrColor = "var(--accent-green)"; }
    else if (rr >= 2.0) { rrText = "✨ 2.0 以上：理想"; rrColor = "var(--accent-gold)"; }
    else if (rr >= 1.5) { rrText = "⚖️ 1.5 - 2.0：合格"; rrColor = "#ccc"; }

    document.getElementById('statusBox').innerHTML = `
        <div class="score-circle" style="border-color:${signalColor}; color:${signalColor}">${rr >= 2.0 && p > cost ? '90' : '50'}</div>
        <div style="font-size:18px; font-weight:900; color:${signalColor}">${activeSignal}</div>
        <div class="rr-report">
            <div style="font-size:11px; color:var(--accent-gold); font-weight:bold; margin-bottom:8px;">📊 風報比分析 (RR: ${rr.toFixed(2)})</div>
            <div style="font-size:14px; font-weight:700; color:${rrColor}; margin-bottom:10px;">${rrText}</div>
            <div style="border-top:1px solid #333; padding-top:8px; font-size:11px;">
                <div class="rr-item" style="${rr>=2.0?'color:#fff':''}">● 理想數值：2.0 以上</div>
                <div class="rr-item" style="${rr>=3.0?'color:#fff':''}">● 3.0 以上：極佳</div>
                <div class="rr-item" style="${rr>=1.5 && rr<2.0?'color:#fff':''}">● 1.5 - 2.0：合格 (穩健)</div>
                <div class="rr-item" style="color:var(--accent-red)">● 低於 1.2：不划算</div>
            </div>
        </div>
    `;
}
</script>
</body>
</html>
