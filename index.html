<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>發財強勢股系統｜進出場精算</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161921;
    --card: #1c2030;
    --border: #3d341a; /* 發財金邊框 */
    --accent: #f5c842; /* 發財金 */
    --accent-purple: #b48eff;
    --accent-green: #4ade80;
    --accent-red: #f87171;
    --accent-blue: #4fc3f7;
    --text: #f5eec8;
    --text-muted: #857f61;
    --text-dim: #a39e7e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans TC', sans-serif; min-height: 100vh; padding: 24px 16px 60px; }

  /* HEADER */
  .header { text-align: center; margin-bottom: 30px; }
  .header-tag { display: inline-block; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 3px; color: var(--accent); border: 1px solid var(--accent); padding: 4px 12px; border-radius: 20px; margin-bottom: 12px; text-transform: uppercase; }
  h1 { font-size: 28px; font-weight: 900; background: linear-gradient(135deg, #fff 0%, var(--accent) 55%, #ff9d4d 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 6px; }

  /* SECTIONS */
  .section { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 16px; }
  .section-title { font-size: 13px; font-weight: 700; color: var(--accent); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* INPUTS */
  .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .input-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
  .input-group label { font-size: 11px; color: var(--text-muted); }
  input { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; color: var(--accent); font-family: 'DM Mono', monospace; font-size: 15px; padding: 12px; outline: none; width: 100%; }
  input:focus { border-color: var(--accent); }

  /* BUTTONS */
  .btn-fetch { width: 100%; background: var(--surface); border: 1px solid var(--accent)55; border-radius: 12px; color: var(--accent); font-size: 13px; font-weight: 700; padding: 12px; cursor: pointer; margin-bottom: 15px; display: flex; justify-content: center; align-items: center; gap: 8px; }
  .btn-analyze { width: 100%; background: linear-gradient(135deg, var(--accent), #ff9d4d); border: none; border-radius: 14px; color: #000; font-size: 16px; font-weight: 900; padding: 16px; cursor: pointer; margin-top: 10px; letter-spacing: 2px; }

  /* TABLES & LISTS */
  .fib-table { width: 100%; border-collapse: separate; border-spacing: 0 5px; font-family: 'DM Mono', monospace; font-size: 12px; }
  .fib-table td { padding: 10px; background: var(--surface); }
  .fib-table td:first-child { border-radius: 8px 0 0 8px; font-weight: 700; }
  .fib-table td:last-child { border-radius: 0 8px 8px 0; text-align: right; }

  /* CHECKBOX & RADIO (繼承兔子版) */
  .checkbox-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .check-item { display: flex; align-items: center; gap: 8px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 10px; cursor: pointer; }
  .check-item input { display: none; }
  .check-item:has(input:checked) { border-color: var(--accent-green); background: rgba(74,222,128,0.05); }
  
  .radio-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .radio-btn { flex: 1; min-width: 80px; text-align: center; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 10px; font-size: 11px; cursor: pointer; }
  .radio-btn.selected-gold { border-color: var(--accent); background: rgba(245,200,66,0.1); color: var(--accent); }

  /* RESULT BOXES */
  .hero-box { text-align: center; padding: 24px; border-radius: 16px; background: var(--card); border: 2px solid var(--accent); margin-bottom: 16px; }
  .signal-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; margin-top: 10px; }
  .progress-bg { height: 8px; background: var(--border); border-radius: 4px; margin-top: 10px; overflow: hidden; }
  .progress-fill { height: 100%; transition: width 0.8s; }
  
  #results { display: none; }
  .loading { opacity: 0.5; pointer-events: none; }
</style>
</head>
<body>

<div class="header">
  <div class="header-tag">🧧 Fortune Finance System</div>
  <h1>發財強勢股精算系統</h1>
  <p style="font-size: 12px; color: var(--text-muted)">數據連動：波浪位階 × 斐波那契黃金比例</p>
</div>

<div class="section">
  <div class="section-title">📡 數據自動抓取</div>
  <div class="input-group">
    <label>股票代號</label>
    <input type="text" id="ticker" placeholder="例如：3481">
  </div>
  <button class="btn-fetch" id="btnFetch" onclick="fetchStockData()">📡 啟動強化高低點抓取</button>
  
  <div class="input-grid">
    <div class="input-group"><label>波段低點</label><input type="number" id="low" step="0.01"></div>
    <div class="input-group"><label>波段高點</label><input type="number" id="high" step="0.01"></div>
  </div>
  <div class="input-grid">
    <div class="input-group"><label>當前現價</label><input type="number" id="price" step="0.01"></div>
    <div class="input-group"><label>法人成本</label><input type="number" id="cost" step="0.01" placeholder="共振判定"></div>
  </div>
</div>

<div class="section">
  <div class="section-title">✅ 選股四原則</div>
  <div class="checkbox-grid">
    <label class="check-item"><input type="checkbox" id="c1"> <span>① 強勢股</span></label>
    <label class="check-item"><input type="checkbox" id="c2"> <span>② 法人加碼</span></label>
    <label class="check-item"><input type="checkbox" id="c3"> <span>③ 多頭線型</span></label>
    <label class="check-item"><input type="checkbox" id="c4"> <span>④ 價格優勢</span></label>
  </div>
</div>

<div class="section">
  <div class="section-title">🌊 市場矩陣狀態</div>
  <div class="input-group"><label>市場類型</label>
    <div class="radio-row" id="marketGroup">
      <div class="radio-btn" onclick="setRadio('marketGroup','contraction',this)">📉 收縮盤</div>
      <div class="radio-btn" onclick="setRadio('marketGroup','expansion',this)">📈 擴張盤</div>
    </div>
  </div>
  <div class="input-group"><label>成交量</label>
    <div class="radio-row" id="volGroup">
      <div class="radio-btn" onclick="setRadio('volGroup','low',this)">🔴 量縮</div>
      <div class="radio-btn" onclick="setRadio('volGroup','high',this)">🟢 量增</div>
    </div>
  </div>
</div>

<button class="btn-analyze" onclick="runAnalysis()">🧧 開始發財精算</button>

<div id="results">
  <div class="divider" style="height:1px; background:var(--border); margin:25px 0"></div>

  <div class="hero-box" id="heroBox">
    <div id="resEmoji" style="font-size:40px">⌛</div>
    <div id="resSignal" style="font-size:24px; font-weight:900; margin:10px 0;">等待分析...</div>
    <div id="resAction" class="signal-badge">--</div>
    <div id="resReason" style="font-size:12px; color:var(--text-dim); margin-top:12px; line-height:1.6; text-align:left;"></div>
    
    <div style="margin-top:15px">
      <div style="display:flex; justify-content:space-between; font-size:11px; color:var(--text-muted)">
        <span>勝率信心指數</span><span id="resConf">0%</span>
      </div>
      <div class="progress-bg"><div id="resBar" class="progress-fill" style="width:0%"></div></div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">📐 斐波那契關鍵位</div>
    <table class="fib-table" id="fibTable"></table>
  </div>

  <div class="section" id="waveBox">
    <div class="section-title">🌊 法人波浪目標位</div>
    <div id="waveContent"></div>
  </div>
</div>

<script>
let state = { market: '', vol: '' };

function setRadio(group, val, el) {
    state[group === 'marketGroup' ? 'market' : 'vol'] = val;
    document.getElementById(group).querySelectorAll('.radio-btn').forEach(b => b.classList.remove('selected-gold'));
    el.classList.add('selected-gold');
}

// 強化抓取邏輯
async function fetchStockData() {
    let t = document.getElementById('ticker').value.trim().toUpperCase();
    if (!t) return alert('請輸入代號');
    if (!t.includes('.')) t = (t.length >= 4) ? t + '.TW' : t;
    
    const btn = document.getElementById('btnFetch');
    btn.textContent = '強化抓取中...';
    btn.classList.add('loading');

    try {
        const url = `https://query1.finance.yahoo.com/v8/finance/chart/${t}?interval=1d&range=3mo`;
        const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
        const json = await res.json();
        const data = JSON.parse(json.contents).chart.result[0];
        const quote = data.indicators.quote[0];
        
        const highs = quote.high.filter(v => v != null);
        const lows = quote.low.filter(v => v != null);
        const closes = quote.close.filter(v => v != null);

        document.getElementById('high').value = Math.max(...highs).toFixed(2);
        document.getElementById('low').value = Math.min(...lows).toFixed(2);
        document.getElementById('price').value = closes[closes.length - 1].toFixed(2);
        
        btn.textContent = '✅ 抓取成功';
        setTimeout(() => { btn.textContent = '📡 啟動強化高低點抓取'; btn.classList.remove('loading'); }, 2000);
    } catch (e) {
        alert('抓取失敗，請手動輸入數據');
        btn.classList.remove('loading');
    }
}

function runAnalysis() {
    const p = parseFloat(document.getElementById('price').value);
    const hi = parseFloat(document.getElementById('high').value);
    const lo = parseFloat(document.getElementById('low').value);
    const cost = parseFloat(document.getElementById('cost').value);
    
    if (!p || !hi || !lo) return alert('請填寫核心數據');
    document.getElementById('results').style.display = 'block';

    const range = hi - lo;
    const fibs = [
        { r: 0, l: "起漲點", role: "支撐" },
        { r: 0.382, l: "38.2%", role: "黃金支撐" },
        { r: 0.5, l: "50%", role: "多空分界" },
        { r: 0.618, l: "61.8%", role: "黃金比例" },
        { r: 0.786, l: "78.6%", role: "深回調" },
        { r: 1, l: "100%", role: "波段高點" },
        { r: 1.618, l: "161.8%", role: "黃金延伸" }
    ];

    // 渲染斐波那契表格
    let fibHTML = "";
    fibs.forEach(f => {
        const val = f.r <= 1 ? (hi - range * f.r) : (hi + range * (f.r - 1));
        const priceVal = val.toFixed(2);
        const isNear = Math.abs(p - val) / p < 0.015;
        fibHTML += `<tr>
            <td style="color:var(--accent)">${f.l}</td>
            <td style="color:var(--text-dim)">${f.role}</td>
            <td style="font-weight:700">$${priceVal}</td>
            <td style="color:${isNear?'var(--accent-green)':'var(--text-muted)'}">${isNear?'⭐在此':'--'}</td>
        </tr>`;
    });
    document.getElementById('fibTable').innerHTML = fibHTML;

    // 波浪邏輯 (1.04/1.2/1.4)
    if (cost) {
        const b = (cost * 1.04).toFixed(2);
        const t1 = (cost * 1.2).toFixed(2);
        const t2 = (cost * 1.4).toFixed(2);
        document.getElementById('waveContent').innerHTML = `
            <div style="background:var(--surface); padding:15px; border-radius:12px; border:1px solid var(--accent)55">
                <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; text-align:center">
                    <div><div style="font-size:10px; color:var(--text-muted)">1.04 突破</div><div style="font-weight:700; color:var(--accent)">$${b}</div></div>
                    <div><div style="font-size:10px; color:var(--text-muted)">1.20 壓力</div><div style="font-weight:700; color:var(--accent-purple)">$${t1}</div></div>
                    <div><div style="font-size:10px; color:var(--text-muted)">1.40 滿足</div><div style="font-weight:700; color:var(--accent-red)">$${t2}</div></div>
                </div>
            </div>`;
    } else {
        document.getElementById('waveContent').innerHTML = "<div style='text-align:center; color:var(--text-muted); font-size:12px'>輸入法人成本以顯示波浪目標</div>";
    }

    // 判定邏輯 (React + Matrix 綜合)
    let sig = "觀望等待"; let clr = "var(--accent)"; let emj = "⚖️"; let conf = 50;
    let reason = "股價處於波動區間，建議等待 61.8% 支撐或 1.04 突破訊號。";

    if (p >= hi) {
        sig = "突破前高！強勢噴發"; clr = "var(--accent-green)"; emj = "🚀"; conf = 85;
        reason = "股價已突破 100% 位階，進入延伸段。若伴隨量增，目標看 1.618 位階。";
    } else if (p <= hi - range * 0.618 * 1.02 && p >= hi - range * 0.618 * 0.98) {
        sig = "黃金進場點 61.8%"; clr = "var(--accent)"; emj = "🥇"; conf = 90;
        reason = "回測黃金比例 61.8% 守住，為高勝率買點，停損設於 78.6% 位階下。";
    } else if (p < hi - range) {
        sig = "趨勢轉空，禁止做多"; clr = "var(--accent-red)"; emj = "🛑"; conf = 20;
        reason = "跌破起漲低點，進入空頭排列，切勿伸手接刀。";
    }

    // 更新 Hero UI
    document.getElementById('resEmoji').textContent = emj;
    document.getElementById('resSignal').textContent = sig;
    document.getElementById('resSignal').style.color = clr;
    document.getElementById('resAction').textContent = state.market === 'expansion' ? "順勢加碼" : "區間操作";
    document.getElementById('resAction').style.background = clr + "22";
    document.getElementById('resAction').style.color = clr;
    document.getElementById('resReason').textContent = reason;
    document.getElementById('resConf').textContent = conf + "%";
    document.getElementById('resBar').style.width = conf + "%";
    document.getElementById('resBar').style.background = clr;

    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}
</script>
</body>
</html>
