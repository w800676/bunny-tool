<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bunny Finance Lab - 法人成本分析</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #0d0f14; }
        /* 隱藏 Chrome/Safari 數字輸入框的上下箭頭 */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        /* 隱藏 Firefox 數字輸入框的上下箭頭 */
        input[type=number] { -moz-appearance: textfield; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useCallback } = React;

        const C = {
            bg: "#0d0f14", surface: "#161921", card: "#1c2030", border: "#2a2f3e",
            pink: "#ff6b9d", green: "#4ade80", red: "#f87171", yellow: "#fbbf24",
            blue: "#60a5fa", purple: "#a78bfa", text: "#e8eaf0", muted: "#6b7280", dim: "#9ca3af",
        };

        const s = {
            wrap: { background: C.bg, minHeight: "100vh", padding: "24px 16px 60px", fontFamily: "system-ui, sans-serif", color: C.text },
            headerTag: { display: "inline-block", fontSize: 11, letterSpacing: 3, color: C.pink, border: `1px solid ${C.pink}`, padding: "4px 12px", borderRadius: 20, marginBottom: 12, textTransform: "uppercase" },
            h1: { fontSize: "clamp(20px,5vw,28px)", fontWeight: 900, background: `linear-gradient(135deg,#fff 0%,${C.pink} 60%,${C.purple} 100%)`, WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent", marginBottom: 4 },
            section: { background: C.card, border: `1px solid ${C.border}`, borderRadius: 16, padding: 20, marginBottom: 16 },
            sectionTitle: { fontSize: 13, fontWeight: 700, letterSpacing: 1, color: C.pink, marginBottom: 14, display: "flex", alignItems: "center", gap: 8 },
            input: { background: C.surface, border: `1px solid ${C.border}`, borderRadius: 10, color: C.text, fontSize: 15, padding: "10px 12px", outline: "none", width: "100%", fontFamily: "monospace", boxSizing: "border-box" },
            btn: { width: "100%", background: `linear-gradient(135deg,${C.pink},${C.purple})`, border: "none", borderRadius: 14, color: "#fff", fontSize: 16, fontWeight: 700, padding: 16, cursor: "pointer", marginTop: 8, letterSpacing: 1 },
            badge: (type) => ({ display: "inline-flex", alignItems: "center", gap: 4, fontSize: 11, fontWeight: 700, padding: "3px 10px", borderRadius: 20, ...(type === "pass" ? { background: "rgba(74,222,128,0.15)", color: C.green, border: `1px solid rgba(74,222,128,0.3)` } : type === "fail" ? { background: "rgba(248,113,113,0.15)", color: C.red, border: `1px solid rgba(248,113,113,0.3)` } : type === "warn" ? { background: "rgba(251,191,36,0.15)", color: C.yellow, border: `1px solid rgba(251,191,36,0.3)` } : { background: "rgba(96,165,250,0.15)", color: C.blue, border: `1px solid rgba(96,165,250,0.3)` }) }),
            infoNote: { fontSize: 11, color: C.muted, background: "rgba(96,165,250,0.06)", border: `1px solid rgba(96,165,250,0.15)`, borderRadius: 8, padding: "10px 12px", lineHeight: 1.6, marginTop: 10 },
        };

        // --- Logic Functions ---
        function calcEntryTiming(price, cost) {
            const bt = +(cost * 1.04).toFixed(2);
            const g1 = +(cost * 1.2).toFixed(2);
            const g2 = +(cost * 1.4).toFixed(2);
            const g3 = +(cost * 1.7).toFixed(2);

            if (price < cost) return { phase: "法人收貨期", phaseColor: C.red, signal: "禁止進場", signalColor: C.red, signalEmoji: "🚫", canEnter: false, entry: null, stopLoss: null, target: cost, timing: `現價低於法人成本 $${cost}，法人仍在壓低收貨。等現價站上成本後再觀察。`, rule: "不該進場：現價低於法人成本，沒有波浪基礎。", phaseIdx: 0 };
            if (price < bt) return { phase: "突破前蓄力", phaseColor: C.yellow, signal: "等待放量突破", signalColor: C.yellow, signalEmoji: "👀", canEnter: false, entry: bt, stopLoss: +(cost * 0.97).toFixed(2), target: g1, timing: `現價距突破點 $${bt} 還差 ${(((bt - price) / price) * 100).toFixed(1)}%。等放量（量>前日1.5倍）突破 $${bt} 後才是第一進場點。`, rule: "不該追：尚未突破，等訊號出現。", phaseIdx: 1 };
            if (price < g1) {
                const fromBt = (((price - bt) / bt) * 100).toFixed(1);
                const isEarly = fromBt <= 3;
                return { phase: "第一波啟動", phaseColor: C.green, signal: isEarly ? "✅ 第一進場點" : "等盤整後加碼", signalColor: C.green, signalEmoji: isEarly ? "🟢" : "📊", canEnter: true, entry: isEarly ? price : null, stopLoss: +(bt * 0.98).toFixed(2), target: g1, timing: isEarly ? `剛突破 $${bt}，為第一進場機會。停損設突破點下方 $${+(bt * 0.98).toFixed(2)}，目標關卡一 $${g1}。` : `已突破後上漲 ${fromBt}%，追高風險較高。等盤整3-5日縮量後，再次放量突破時加碼。`, rule: isEarly ? "最佳時機：剛突破法人成本×1.04。" : "等盤整：漲太多了，等回踩再進。", phaseIdx: 2 };
            }
            if (price < g2) {
                const fromG1 = (((price - g1) / g1) * 100).toFixed(1);
                const isEarly = fromG1 <= 3;
                return { phase: "第二波推升", phaseColor: C.green, signal: isEarly ? "✅ 關卡一突破加碼" : "等關卡一盤整後", signalColor: isEarly ? C.green : C.yellow, signalEmoji: isEarly ? "🚀" : "⏳", canEnter: isEarly, entry: isEarly ? price : null, stopLoss: +(g1 * 0.97).toFixed(2), target: g2, timing: isEarly ? `剛突破關卡一 $${g1}，波段加碼機會。停損 $${+(g1 * 0.97).toFixed(2)}，目標關卡二 $${g2}。` : `過關卡一後上漲 ${fromG1}%，等盤整3-5日縮量後再次放量才進場，不追高。`, rule: isEarly ? "加碼時機：剛突破關卡一。" : "等盤整：等關卡一整理完再進。", phaseIdx: 3 };
            }
            if (price < g3) {
                const fromG2 = (((price - g2) / g2) * 100).toFixed(1);
                const isEarly = fromG2 <= 3;
                return { phase: "第三波衝刺", phaseColor: C.yellow, signal: isEarly ? "⚠️ 最後加碼機會" : "準備分批出場", signalColor: isEarly ? C.yellow : C.red, signalEmoji: isEarly ? "🏔️" : "🔔", canEnter: isEarly, entry: isEarly ? price : null, stopLoss: +(g2 * 0.97).toFixed(2), target: g3, timing: isEarly ? `剛突破關卡二 $${g2}，最後加碼機會但風險已高。停損 $${+(g2 * 0.97).toFixed(2)}，目標 $${g3}。` : `已接近關卡三 $${g3}，不建議新進。持有者開始分批獲利了結，高點量縮即出場。`, rule: isEarly ? "最後機會：風險報酬比已不如前兩波。" : "不該進場：已接近歷史高點，韭菜陷阱。", phaseIdx: 4 };
            }
            return { phase: "高點區域", phaseColor: C.red, signal: "禁止追買，分批出場", signalColor: C.red, signalEmoji: "🔴", canEnter: false, entry: null, stopLoss: null, target: null, timing: `現價已達關卡三 $${g3}（×1.7），歷史高點區。持有者分批出場，空手者禁止追高。`, rule: "不該進場：已達最高目標，禁止追高。", phaseIdx: 5 };
        }

        function calcMatrix(marketType, priceZone, volume) {
            if (!marketType || !priceZone || !volume) return null;
            const map = {
                contraction: {
                    high: { contracted: { action: "快速賣出", color: C.red, emoji: "⚡" }, expanded: { action: "準備賣出", color: C.yellow, emoji: "✋" } },
                    low:  { contracted: { action: "準備買入", color: C.yellow, emoji: "✋" }, expanded: { action: "快速買入", color: C.green, emoji: "⚡" } },
                },
                expansion: {
                    high: { contracted: { action: "準備賣出", color: C.yellow, emoji: "✋" }, expanded: { action: "繼續加碼", color: C.green, emoji: "🚀" } },
                    low:  { contracted: { action: "繼續加空", color: C.purple, emoji: "📉" }, expanded: { action: "準備買入", color: C.yellow, emoji: "✋" } },
                },
            };
            return { ...map[marketType][priceZone][volume], strategy: marketType === "contraction" ? "逆勢操作（高出低進）" : "順勢操作（追漲殺跌）", marketType, priceZone, volume };
        }

        // --- Components ---
        function EntryTimingCard({ cost, price, label, color }) {
            const t = calcEntryTiming(price, cost);
            const phaseNames = ["收貨期","蓄力","第一波","第二波","第三波","高點"];
            const phaseBarColors = [C.red, C.yellow, C.green, C.green, C.yellow, C.red];
            return (
                <div style={{ marginBottom: 20 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
                        <div style={{ width: 10, height: 10, borderRadius: "50%", background: color, flexShrink: 0 }} />
                        <span style={{ fontSize: 13, fontWeight: 700, color }}>{label}成本進場時機</span>
                        <span style={{ fontFamily: "monospace", fontSize: 11, color: C.muted }}>基準 ${cost}</span>
                    </div>
                    <div style={{ display: "flex", gap: 3, marginBottom: 12 }}>
                        {phaseNames.map((ph, i) => (
                            <div key={i} style={{ flex: 1, textAlign: "center" }}>
                                <div style={{ height: 6, borderRadius: 3, background: i <= t.phaseIdx ? phaseBarColors[i] : C.border, marginBottom: 4 }} />
                                <div style={{ fontSize: 9, color: i === t.phaseIdx ? C.text : C.muted, fontWeight: i === t.phaseIdx ? 700 : 400 }}>{ph}</div>
                            </div>
                        ))}
                    </div>
                    <div style={{ background: t.canEnter ? "rgba(74,222,128,0.07)" : price < (+(cost * 1.04).toFixed(2)) && price >= cost ? "rgba(251,191,36,0.07)" : price < cost ? "rgba(248,113,113,0.07)" : "rgba(248,113,113,0.06)", border: `1px solid ${t.phaseColor}44`, borderRadius: 12, padding: 14, marginBottom: 10 }}>
                        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                                <span style={{ fontSize: 22 }}>{t.signalEmoji}</span>
                                <div>
                                    <div style={{ fontSize: 15, fontWeight: 900, color: t.signalColor }}>{t.signal}</div>
                                    <div style={{ fontSize: 11, color: C.muted }}>{t.phase}</div>
                                </div>
                            </div>
                            <span style={s.badge(t.canEnter ? "pass" : "fail")}>{t.canEnter ? "可進場" : "暫勿進"}</span>
                        </div>
                        <div style={{ fontSize: 12, color: C.dim, lineHeight: 1.7 }}>{t.timing}</div>
                    </div>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 6 }}>
                        {[{ label: "進場點", val: t.entry ? `$${t.entry}` : "—", color: t.canEnter ? C.green : C.muted }, { label: "停損點", val: t.stopLoss ? `$${t.stopLoss}` : "—", color: t.stopLoss ? C.red : C.muted }, { label: "目標價", val: t.target ? `$${t.target}` : "—", color: t.target ? C.yellow : C.muted }].map((item, i) => (
                            <div key={i} style={{ background: C.surface, borderRadius: 10, padding: "10px 8px", textAlign: "center" }}>
                                <div style={{ fontSize: 10, color: C.muted, marginBottom: 4 }}>{item.label}</div>
                                <div style={{ fontFamily: "monospace", fontWeight: 700, fontSize: 14, color: item.color }}>{item.val}</div>
                            </div>
                        ))}
                    </div>
                    <div style={{ ...s.infoNote, borderColor: `${t.phaseColor}33`, background: `${t.phaseColor}08` }}>💡 {t.rule}</div>
                </div>
            );
        }

        function SectionTitle({ children }) {
            return (
                <div style={s.sectionTitle}>
                    {children}
                    <div style={{ flex: 1, height: 1, background: C.border }} />
                </div>
            );
        }

        function RadioBtn({ label, sub, value, selected, color, onClick }) {
            const active = selected === value;
            return (
                <div onClick={onClick} style={{ flex: 1, minWidth: 80, textAlign: "center", background: active ? `${color}18` : C.surface, border: `1px solid ${active ? color : C.border}`, borderRadius: 10, padding: "10px 8px", cursor: "pointer", fontSize: 12, color: active ? color : C.dim, fontWeight: active ? 700 : 400, transition: "all 0.2s" }}>
                    {label}{sub && <><br /><small style={{ color: active ? color : C.muted }}>{sub}</small></>}
                </div>
            );
        }

        function CheckItem({ label, sub, checked, onChange }) {
            return (
                <div onClick={onChange} style={{ display: "flex", alignItems: "center", gap: 8, background: checked ? "rgba(74,222,128,0.07)" : C.surface, border: `1px solid ${checked ? C.green : C.border}`, borderRadius: 10, padding: "10px 12px", cursor: "pointer" }}>
                    <div style={{ width: 16, height: 16, border: `2px solid ${checked ? C.green : C.border}`, borderRadius: 4, flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, background: checked ? C.green : "transparent", color: "#000", fontWeight: 700 }}>{checked ? "✓" : ""}</div>
                    <span style={{ fontSize: 12, lineHeight: 1.3, color: checked ? C.text : C.dim }}>{label}<br /><small style={{ color: C.muted }}>{sub}</small></span>
                </div>
            );
        }

        function CostRow({ dotColor, label, value, onChange, ratio }) {
            const above = ratio !== null && ratio >= 0;
            const hasRatio = ratio !== null;
            return (
                <div style={{ display: "flex", alignItems: "center", gap: 10, background: C.surface, border: `1px solid ${hasRatio ? (above ? "rgba(74,222,128,0.3)" : "rgba(248,113,113,0.25)") : C.border}`, borderRadius: 10, padding: "10px 12px" }}>
                    <div style={{ width: 10, height: 10, borderRadius: "50%", background: dotColor, flexShrink: 0 }} />
                    <span style={{ fontSize: 12, color: C.muted, width: 56, flexShrink: 0 }}>{label}</span>
                    <input type="number" value={value} onChange={e => onChange(e.target.value)} placeholder="輸入價格" step="0.1"
                        style={{ flex: 1, background: "transparent", border: "none", color: C.text, fontFamily: "monospace", fontSize: 15, outline: "none", minWidth: 0 }} />
                    <span style={{ fontFamily: "monospace", fontSize: 11, color: hasRatio ? (above ? C.green : C.red) : C.muted, width: 52, textAlign: "right", flexShrink: 0 }}>
                        {hasRatio ? `${above ? "+" : ""}${ratio.toFixed(1)}%` : "—"}
                    </span>
                </div>
            );
        }

        function WaveTable({ cost, price, label, color }) {
            const bt = +(cost * 1.04).toFixed(2);
            const g1 = +(cost * 1.2).toFixed(2);
            const g2 = +(cost * 1.4).toFixed(2);
            const g3 = +(cost * 1.7).toFixed(2);
            const levels = [
                { label: "成本基準", mult: "×1.00", target: cost, isBase: true },
                { label: "突破點",   mult: "×1.04", target: bt },
                { label: "關卡一",   mult: "×1.20", target: g1 },
                { label: "關卡二",   mult: "×1.40", target: g2 },
                { label: "關卡三",   mult: "×1.70", target: g3 },
            ];
            return (
                <div style={{ marginBottom: 18 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
                        <div style={{ width: 10, height: 10, borderRadius: "50%", background: color, flexShrink: 0 }} />
                        <span style={{ fontSize: 13, fontWeight: 700, color }}>{label}成本波浪</span>
                        <span style={{ fontFamily: "monospace", fontSize: 12, color: C.muted }}>基準 ${cost}</span>
                    </div>
                    <table style={{ width: "100%", borderCollapse: "separate", borderSpacing: "0 5px", fontFamily: "monospace", fontSize: 13 }}>
                        <thead>
                            <tr>{["關卡","倍數","目標價","狀態"].map(h => <th key={h} style={{ fontSize: 10, letterSpacing: 1, color: C.muted, padding: "0 10px 4px", textAlign: "left", fontFamily: "system-ui" }}>{h}</th>)}</tr>
                        </thead>
                        <tbody>
                            {levels.map(l => {
                                const reached = price >= l.target;
                                return (
                                    <tr key={l.label}>
                                        <td style={{ padding: "9px 10px", background: l.isBase ? "rgba(96,165,250,0.06)" : C.surface, borderRadius: "8px 0 0 8px", fontWeight: 700, color: C.text }}>{l.label}</td>
                                        <td style={{ padding: "9px 10px", background: l.isBase ? "rgba(96,165,250,0.06)" : C.surface, color: C.muted }}>{l.mult}</td>
                                        <td style={{ padding: "9px 10px", background: l.isBase ? "rgba(96,165,250,0.06)" : C.surface, color: reached ? C.green : C.muted, fontWeight: 700, fontSize: 15 }}>${l.target}</td>
                                        <td style={{ padding: "9px 10px", background: l.isBase ? "rgba(96,165,250,0.06)" : C.surface, borderRadius: "0 8px 8px 0", textAlign: "right" }}>
                                            <span style={s.badge(reached ? "pass" : "fail")}>{reached ? "已達" : "未達"}</span>
                                        </td>
                                    </tr>
                                );
                            })}
                        </tbody>
                    </table>
                    <div style={s.infoNote}>{price < cost ? `⚠️ 現價低於${label}成本，等待站上 $${cost}。` : bt - price > 0 ? `距突破點差 ${(bt - price).toFixed(2)} 元，等放量突破 $${bt}。` : `✅ 已突破×1.04，波浪啟動。`}</div>
                </div>
            );
        }

        function App() {
            const [price, setPrice] = useState("");
            const [foreign, setForeign] = useState("");
            const [trust, setTrust] = useState("");
            const [major, setMajor] = useState("");
            const [code, setCode] = useState("");
            const [name, setName] = useState("");
            const [checks, setChecks] = useState([false, false, false, false]);
            const [marketType, setMarketType] = useState(null);
            const [priceZone, setPriceZone] = useState(null);
            const [volume, setVolume] = useState(null);
            const [result, setResult] = useState(null);
            const [error, setError] = useState("");

            const p = parseFloat(price);
            const getRatio = (v) => { const c = parseFloat(v); return (c && p) ? ((p / c - 1) * 100) : null; };
            const toggleCheck = (i) => setChecks(prev => prev.map((v, idx) => idx === i ? !v : v));

            const analyze = useCallback(() => {
                const pv = parseFloat(price), fv = parseFloat(foreign) || null, tv = parseFloat(trust) || null, mv = parseFloat(major) || null;
                if (!pv) { setError("請輸入當前股價！"); return; }
                if (!fv && !tv && !mv) { setError("請至少輸入一項法人成本！"); return; }
                setError("");
                const primaryCost = fv || tv || mv;
                const primaryLabel = fv ? "外資" : tv ? "投信" : "主力";
                const bt = +(primaryCost * 1.04).toFixed(2), g1 = +(primaryCost * 1.2).toFixed(2), g2 = +(primaryCost * 1.4).toFixed(2), g3 = +(primaryCost * 1.7).toFixed(2);
                const c4a = checks[3] || (pv >= primaryCost * 0.95);
                const scoreArr = [checks[0], checks[1], checks[2], c4a];
                const score = scoreArr.filter(Boolean).length;
                const matrix = calcMatrix(marketType, priceZone, volume);
                let mainAction, mainClass, mainEmoji, mainDesc;
                if (pv < primaryCost)  { mainAction = "觀察等待 / 停損考慮"; mainClass = "wait"; mainEmoji = "⏸️"; mainDesc = `現價低於${primaryLabel}成本 $${primaryCost}，法人仍在收貨，非買點。`; }
                else if (pv < bt)      { mainAction = "等待突破點確認";       mainClass = "wait"; mainEmoji = "👀"; mainDesc = `現價距突破點 $${bt} 尚差 ${(bt-pv).toFixed(2)} 元，等放量突破後介入。`; }
                else if (pv < g1)      { mainAction = "可考慮買入";           mainClass = "buy";  mainEmoji = "🟢"; mainDesc = `已突破×1.04，下一目標關卡一 $${g1}。買入後盤整3-5日屬正常。`; }
                else if (pv < g2)      { mainAction = "持有 / 波段操作";      mainClass = "buy";  mainEmoji = "📈"; mainDesc = `已過關卡一，向關卡二 $${g2} 前進。持有為主，盤整後可加碼。`; }
                else if (pv < g3)      { mainAction = "持有等待高點";         mainClass = "buy";  mainEmoji = "🏔️"; mainDesc = `已過關卡二，目標關卡三 $${g3}。注意量縮訊號，準備分批出場。`; }
                else                   { mainAction = "接近高點，注意出場";   mainClass = "sell"; mainEmoji = "🔴"; mainDesc = `現價超過×1.7成本，歷史高點區域，建議分批獲利了結。`; }
                if (matrix && (matrix.action.includes("賣") || matrix.action.includes("空"))) mainClass = matrix.action.includes("快速") ? "sell" : "wait";
                const filledCosts = [fv && { val: fv, label: "外資", color: C.blue }, tv && { val: tv, label: "投信", color: "#f472b6" }, mv && { val: mv, label: "主力", color: "#fb923c" }].filter(Boolean);
                const aboveAll = filledCosts.every(c => pv >= c.val), belowAll = filledCosts.every(c => pv < c.val);
                const avgCost = filledCosts.length > 1 ? +(filledCosts.reduce((s, c) => s + c.val, 0) / filledCosts.length).toFixed(2) : null;
                const stockLabel = name ? `${name}(${code || "—"})` : code || "該股";
                const nextTarget = pv < bt ? `突破點 $${bt}` : pv < g1 ? `關卡一 $${g1}` : pv < g2 ? `關卡二 $${g2}` : pv < g3 ? `關卡三 $${g3}` : `已達最高 $${g3}`;
                setResult({ pv, fv, tv, mv, filledCosts, avgCost, aboveAll, belowAll, score, scoreArr, mainAction, mainClass, mainEmoji, mainDesc, matrix, primaryLabel, nextTarget, stockLabel });
                setTimeout(() => document.getElementById("results-top")?.scrollIntoView({ behavior: "smooth" }), 100);
            }, [price, foreign, trust, major, code, name, checks, marketType, priceZone, volume]);

            const scoreColors = ["#f87171","#fbbf24","#fbbf24","#4ade80","#4ade80"];
            const scoreLabels = ["條件不足","條件薄弱","條件普通","條件良好","全條件符合 🎯"];
            const criteriaNames = ["① 強勢股","② 法人持續加碼","③ 多頭線型","④ 現價接近/高於成本"];
            const criteriaSubs  = ["近期走勢強","外資/投信買超","均線多頭排列","現價≥成本或差距不多"];

            return (
                <div style={s.wrap}>
                    <div style={{ textAlign: "center", marginBottom: 32 }}>
                        <div style={s.headerTag}>💰 發財 Finance Lab</div>
                        <div style={s.h1}>法人成本波浪分析系統</div>
                        <div style={{ color: C.muted, fontSize: 13 }}>輸入數據，自動輸出買賣訊號與進場時機</div>
                    </div>
                    <div style={s.section}>
                        <SectionTitle>📊 基本數據</SectionTitle>
                        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 14 }}>
                            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}><label style={{ fontSize: 11, color: C.muted }}>股票代號（選填）</label><input style={s.input} value={code} onChange={e => setCode(e.target.value)} placeholder="e.g. 1815" /></div>
                            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}><label style={{ fontSize: 11, color: C.muted }}>股票名稱（選填）</label><input style={s.input} value={name} onChange={e => setName(e.target.value)} placeholder="e.g. 富喬" /></div>
                            <div style={{ display: "flex", flexDirection: "column", gap: 6, gridColumn: "span 2" }}><label style={{ fontSize: 11, color: C.muted }}>當前股價（現價）</label><input style={s.input} type="number" value={price} onChange={e => setPrice(e.target.value)} placeholder="e.g. 98.8" step="0.1" /></div>
                        </div>
                        <div style={{ fontSize: 11, color: C.muted, marginBottom: 10 }}>三大法人成本（至少填一項）</div>
                        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                            <CostRow dotColor={C.blue}  label="外資成本" value={foreign} onChange={setForeign} ratio={getRatio(foreign)} />
                            <CostRow dotColor="#f472b6" label="投信成本" value={trust}   onChange={setTrust}   ratio={getRatio(trust)} />
                            <CostRow dotColor="#fb923c" label="主力成本" value={major}   onChange={setMajor}   ratio={getRatio(major)} />
                        </div>
                    </div>
                    <div style={s.section}>
                        <SectionTitle>✅ 選股四原則</SectionTitle>
                        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                            {criteriaNames.map((n, i) => <CheckItem key={i} label={n} sub={criteriaSubs[i]} checked={checks[i]} onChange={() => toggleCheck(i)} />)}
                        </div>
                    </div>
                    <div style={s.section}>
                        <SectionTitle>🌊 Index 市場狀態</SectionTitle>
                        <div style={{ marginBottom: 14 }}>
                            <div style={{ fontSize: 11, color: C.muted, marginBottom: 8 }}>市場類型</div>
                            <div style={{ display: "flex", gap: 8 }}>
                                <RadioBtn label="📉 收縮盤" sub="盤整操作" value="contraction" selected={marketType} color={C.blue}  onClick={() => setMarketType("contraction")} />
                                <RadioBtn label="📈 擴張盤" sub="趨勢操作" value="expansion"   selected={marketType} color={C.green} onClick={() => setMarketType("expansion")} />
                            </div>
                        </div>
                        <div style={{ marginBottom: 14 }}>
                            <div style={{ fontSize: 11, color: C.muted, marginBottom: 8 }}>價格區域</div>
                            <div style={{ display: "flex", gap: 8 }}>
                                <RadioBtn label="🔴 高點區域" value="high" selected={priceZone} color={C.red}   onClick={() => setPriceZone("high")} />
                                <RadioBtn label="🟢 低點區域" value="low"  selected={priceZone} color={C.green} onClick={() => setPriceZone("low")} />
                            </div>
                        </div>
                        <div>
                            <div style={{ fontSize: 11, color: C.muted, marginBottom: 8 }}>成交量狀態</div>
                            <div style={{ display: "flex", gap: 8 }}>
                                <RadioBtn label="🔴 量縮" sub="Contracted" value="contracted" selected={volume} color={C.yellow} onClick={() => setVolume("contracted")} />
                                <RadioBtn label="🟢 量增" sub="Expanded"   value="expanded"   selected={volume} color={C.green}  onClick={() => setVolume("expanded")} />
                            </div>
                        </div>
                    </div>
                    {error && <div style={{ background: "rgba(248,113,113,0.1)", border: `1px solid rgba(248,113,113,0.3)`, borderRadius: 10, padding: "10px 14px", fontSize: 13, color: C.red, marginBottom: 12 }}>{error}</div>}
                    <button style={s.btn} onClick={analyze}>🔍 開始分析</button>
                    {result && (
                        <div id="results-top">
                            <div style={{ height: 1, background: C.border, margin: "24px 0 16px" }} />
                            <div style={{ fontSize: 11, letterSpacing: 2, color: C.muted, textAlign: "center", marginBottom: 16 }}>── 分析結果 ──</div>
                            <div style={{ ...s.section, textAlign: "center" }}>
                                <div style={{ fontSize: 36, marginBottom: 8 }}>{result.matrix?.emoji || result.mainEmoji}</div>
                                <div style={{ fontSize: 26, fontWeight: 900, marginBottom: 6, color: result.mainClass === "buy" ? C.green : result.mainClass === "sell" ? C.red : C.yellow }}>{result.matrix?.action || result.mainAction}</div>
                                <div style={{ fontSize: 13, color: C.dim }}>{result.mainDesc}</div>
                            </div>
                            <div style={s.section}>
                                <SectionTitle>⏱️ 進場時機判斷</SectionTitle>
                                {result.fv && <EntryTimingCard cost={result.fv} price={result.pv} label="外資" color={C.blue} />}
                                {result.tv && <EntryTimingCard cost={result.tv} price={result.pv} label="投信" color="#f472b6" />}
                                {result.mv && <EntryTimingCard cost={result.mv} price={result.pv} label="主力" color="#fb923c" />}
                                <div style={s.infoNote}>📌 核心原則：等盤整結束後的<strong style={{ color: C.text }}>放量突破</strong>才進場，不追高。每個關卡突破後有 3-5 日盤整，縮量後再次放量才是加碼點。</div>
                            </div>
                            <div style={s.section}>
                                <SectionTitle>🎯 選股評分</SectionTitle>
                                <div style={{ display: "flex", alignItems: "center", gap: 16, padding: 16, background: C.surface, borderRadius: 12, marginBottom: 14 }}>
                                    <div style={{ width: 68, height: 68, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", background: scoreColors[result.score] + "22", border: `3px solid ${scoreColors[result.score]}`, flexShrink: 0 }}>
                                        <span style={{ fontFamily: "monospace", fontWeight: 700, fontSize: 18, color: scoreColors[result.score] }}>{result.score}/4</span>
                                    </div>
                                    <div>
                                        <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 2, color: scoreColors[result.score] }}>{scoreLabels[result.score]}</div>
                                        <div style={{ fontSize: 11, color: C.dim }}>選股四原則通過 {result.score} / 4 項</div>
                                    </div>
                                </div>
                                <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                                    {criteriaNames.map((n, i) => (
                                        <div key={i} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", background: C.surface, borderRadius: 10, padding: "10px 14px" }}>
                                            <span style={{ fontSize: 13, color: C.dim }}>{n}</span>
                                            <span style={s.badge(result.scoreArr[i] ? "pass" : "fail")}>{result.scoreArr[i] ? "✓ 符合" : "✗ 未符合"}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            <div style={s.section}>
                                <SectionTitle>📈 波浪目標價位</SectionTitle>
                                {result.fv && <WaveTable cost={result.fv} price={result.pv} label="外資" color={C.blue} />}
                                {result.tv && <WaveTable cost={result.tv} price={result.pv} label="投信" color="#f472b6" />}
                                {result.mv && <WaveTable cost={result.mv} price={result.pv} label="主力" color="#fb923c" />}
                                {result.filledCosts.length > 1 && (
                                    <div style={{ marginTop: 4 }}>
                                        <div style={{ fontSize: 12, fontWeight: 700, color: C.dim, marginBottom: 8 }}>三大法人成本對比</div>
                                        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                                            {result.filledCosts.map(c => {
                                                const pct = ((result.pv / c.val - 1) * 100).toFixed(1);
                                                const above = result.pv >= c.val;
                                                return (
                                                    <div key={c.label} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", background: C.surface, borderRadius: 10, padding: "10px 14px" }}>
                                                        <span style={{ fontSize: 13, color: C.dim, display: "flex", alignItems: "center", gap: 6 }}>
                                                            <span style={{ width: 8, height: 8, borderRadius: "50%", background: c.color, display: "inline-block" }} />{c.label}成本 ${c.val}
                                                        </span>
                                                        <span style={s.badge(above ? "pass" : "fail")}>{above ? `▲ +${pct}%` : `▼ ${pct}%`}</span>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                        {result.avgCost && <div style={{ marginTop: 8, fontSize: 12, color: C.muted }}>平均成本：<strong style={{ color: C.text, fontFamily: "monospace" }}>${result.avgCost}</strong>　現價比均成本：<strong style={{ color: result.pv >= result.avgCost ? C.green : C.red }}>{((result.pv / result.avgCost - 1) * 100).toFixed(1)}%</strong></div>}
                                        <div style={s.infoNote}>{result.aboveAll ? "✅ 三大法人成本共識：現價全部站上，多頭合力確認。" : result.belowAll ? "⚠️ 現價低於所有法人成本，建議等待。" : "📊 現價介於法人成本之間，注意未突破的成本壓力帶。"}</div>
                                    </div>
                                )}
                            </div>
                            <div style={s.section}>
                                <SectionTitle>🌊 市場矩陣判讀</SectionTitle>
                                {result.matrix ? (
                                    <>
                                        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                                            {[{ label: "市場狀態", val: result.matrix.marketType === "contraction" ? "📉 收縮盤（盤整）" : "📈 擴張盤（趨勢）", color: result.matrix.marketType === "contraction" ? C.blue : C.green }, { label: "策略思維", val: result.matrix.strategy, color: C.text }, { label: "價量狀態", val: `${result.matrix.priceZone === "high" ? "🔴 高點" : "🟢 低點"} × ${result.matrix.volume === "expanded" ? "🟢 量增" : "🔴 量縮"}`, color: C.text }, { label: "矩陣指令", val: `${result.matrix.emoji} ${result.matrix.action}`, color: result.matrix.color, large: true }].map((item, i) => (
                                                <div key={i} style={{ background: C.surface, borderRadius: 10, padding: 12 }}>
                                                    <div style={{ fontSize: 10, color: C.muted, marginBottom: 4 }}>{item.label}</div>
                                                    <div style={{ fontWeight: 700, fontSize: item.large ? 16 : 13, color: item.color }}>{item.val}</div>
                                                </div>
                                            ))}
                                        </div>
                                        <div style={s.infoNote}>根據市場狀態決策矩陣，當前為【{result.matrix.strategy}】模式，建議：{result.matrix.action}。</div>
                                    </>
                                ) : <div style={{ textAlign: "center", color: C.muted, fontSize: 13, padding: 16 }}>未選擇市場狀態，無矩陣判讀結果。</div>}
                            </div>
                            <div style={s.section}>
                                <SectionTitle>📋 操作建議總結</SectionTitle>
                                <div style={{ fontSize: 13, lineHeight: 2.2, color: C.dim }}>
                                    {[
                                        <span key="0">📌 分析標的：<strong style={{ color: C.text }}>{result.stockLabel}</strong></span>,
                                        <span key="1">💰 法人成本：{result.filledCosts.map((c, i) => <span key={i} style={{ color: c.color }}>{c.label} ${c.val}{i < result.filledCosts.length - 1 ? "　" : ""}</span>)}</span>,
                                        <span key="2">📊 當前股價：<strong style={{ color: C.blue }}>${result.pv}</strong></span>,
                                        result.avgCost && <span key="3">📐 平均成本：${result.avgCost}（<strong style={{ color: result.pv >= result.avgCost ? C.green : C.red }}>{((result.pv / result.avgCost - 1) * 100).toFixed(1)}%</strong>）</span>,
                                        <span key="4">🎯 選股評分：{result.score}/4（{scoreLabels[result.score]}）</span>,
                                        result.matrix && <span key="5">🌊 市場矩陣：{result.matrix.action}（{result.matrix.strategy}）</span>,
                                        <span key="6">📈 下一目標：{result.nextTarget}</span>,
                                        <span key="7" style={{ color: C.yellow }}>⚠️ 風險提示：本系統為輔助參考工具，不構成投資建議。</span>,
                                    ].filter(Boolean).map((line, i) => <div key={i} style={{ marginBottom: 2 }}>{line}</div>)}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
