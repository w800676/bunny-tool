<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>發財強勢股精算系統｜Fortune Pro</title>
<style>
:root {
  --bg:#0d0f14; --surface:#161921; --card:#1c2030; --border:#3d341a;
  --gold:#f5c842; --gold-dim:#b59432; --pink:#ff6b9d; --green:#4ade80; --red:#f87171;
  --text:#f5eec8; --muted:#857f61; --dim:#a39e7e;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;min-height:100vh;padding:20px 16px 60px;}
.header{text-align:center;margin-bottom:28px;}
.tag{display:inline-block;font-size:11px;letter-spacing:3px;color:var(--gold);border:1px solid var(--gold);padding:4px 12px;border-radius:20px;margin-bottom:10px;text-transform:uppercase;font-family:monospace;}
h1{font-size:clamp(20px,5vw,28px);font-weight:900;background:linear-gradient(135deg,#fff 0%,var(--gold) 60%,#ff9d4d 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px;}
.sub{color:var(--muted);font-size:12px;}
.section{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:14px;}
.section-title{font-size:13px;font-weight:700;letter-spacing:1px;color:var(--gold);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.section-title::after{content:'';flex:1;height:1px;background:var(--border);}
.input-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.input-group{display:flex;flex-direction:column;gap:5px;}
.input-group label{font-size:11px;color:var(--muted);}
input{background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--gold);font-family:monospace;font-size:15px;padding:10px 12px;outline:none;width:100%;}
input:focus{border-color:var(--gold);box-shadow: 0 0 8px rgba(245, 200, 66, 0.2);}
.btn-auto{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:var(--surface);border:1px solid var(--gold)55;border-radius:12px;color:var(--gold);font-size:14px;font-weight:700;padding:12px;cursor:pointer;margin-top:10px;transition:all .2s;}
.cost-row{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 12px;}
.cost-label{font-size:12px;color:var(--dim);width:60px;flex-shrink:0;}
.cost-input{flex:1;background:transparent;border:none;color:var(--gold);font-family:monospace;font-size:15px;outline:none;}
.btn-main{width:100%;background:linear-gradient(135deg,var(--gold),#ff9d4d);border:none;border-radius:14px;color:#000;font-size:16px;font-weight:900;padding:16px;cursor:pointer;margin-top:6px;letter-spacing:2px;box-shadow: 0 4px 15px rgba(245, 200, 66, 0.3);}
.signal-box{padding:12px;border-radius:10px;margin-top:10px;font-size:13px;font-weight:700;text-align:center;}
.signal-buy{background:rgba(74,222,128,0.15);color:var(--green);border:1px solid var(--green);}
.signal-sell{background:rgba(248,113,113,0.15);color:var(--red);border:1px solid var(--red);}
.signal-wait{background:rgba(245,200,66,0.1);color:var(--gold);border:1px solid var(--gold);}
.fib-table{width:100%;border-collapse:separate;border-spacing:0 4px;font-family:monospace;font-size:12px;width:100%;}
.fib-table td, .fib-table th{padding:10px;background:var(--surface);text-align:left;}
#results{display:none;}
.loading-spinner { display: none; margin-left: 8px; border: 2px solid #f3f3f3; border-top: 2px solid var(--gold); border-radius: 50%; width: 12px; height: 12px; animation: spin 1s linear infinite; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="header">
  <div class="tag">💰 Fortune Trading System</div>
  <h1>發財強勢股精算系統</h1>
  <p class="sub">波浪進場策略 × 完整斐波那契分析</p>
</div>

<div class="section">
  <div class="section-title">🔍 數據自動抓取</div>
  <div class="input-group">
    <label>股票代號 (台股加 .TW，例：3481.TW)</label>
    <input type="text" id="ticker" placeholder="輸入代號" style="text-transform:uppercase">
  </div>
  <button class="btn-auto" id="btnAuto" onclick="fetchStockData()">
    <span id="btnText">📡 抓取近 90 天數據</span>
    <div id="spinner" class="loading-spinner"></div>
  </button>
</div>

<div class="section">
  <div class="section-title">📊 核心數據</div>
  <div class="input-grid" style="margin-bottom:12px;">
    <div class="input-group"><label>當前股價</label><input type="number" id="price" step="0.01"></div>
    <div class="input-group"><label>90D 低點</label><input type="number" id="fibLow" step="0.01"></div>
    <div class="input-group"><label>90D 高點</label><input type="number" id="fibHigh" step="0.01"></div>
  </div>
  <div style="display:flex;flex-direction:column;gap:8px;">
    <div class="cost-row"><span class="cost-label">外資成本</span><input class="cost-input" type="number" id="foreign" step="0.01" placeholder="手動輸入"></div>
    <div class="cost-row"><span class="cost-label">投信成本</span><input class="cost-input" type="number" id="trust" step="0.01" placeholder="手動輸入"></div>
  </div>
</div>

<button class="btn-main" onclick="runAnalysis()">💰 開始發財精算</button>

<div id="results">
  <div class="section" id="signalSummary"></div>
  
  <div class="section">
    <div class="section-title">📐 斐波那契全位階分析</div>
    <table class="fib-table" id="fibTable"></table>
  </div>

  <div class="section" id="waveOutput"></div>
</div>

<script>
async function fetchStockData() {
    const ticker = document.getElementById('ticker').value.trim().toUpperCase();
    const btnText = document.getElementById('btnText');
    const spinner = document.getElementById('spinner');
    
    if (!ticker) return alert('請輸入代號');
    
    btnText.textContent = '抓取中...';
    spinner.style.display = 'inline-block';

    try {
        const endDate = Math.floor(Date.now()/1000);
        const startDate = endDate - 90*24*3600;
        // 使用更穩定的 AllOrigins 代理
        const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?period1=${startDate}&period2=${endDate}&interval=1d`)}`);
        const json = await res.json();
        const data = JSON.parse(json.contents);
        
        const result = data.chart.result[0];
        const quote = result.indicators.quote[0];
        const closes = quote.close.filter(v => v != null);
        const highs = quote.high.filter(v => v != null);
        const lows = quote.low.filter(v => v != null);

        document.getElementById('price').value = closes[closes.length-1].toFixed(2);
        document.getElementById('fibHigh').value = Math.max(...highs).toFixed(2);
        document.getElementById('fibLow').value = Math.min(...lows).toFixed(2);
        alert('數據抓取成功！');
    } catch (e) {
        console.error(e);
        alert('抓取失敗，可能是 API 限制或代號錯誤。請稍後再試或手動輸入價格。');
    } finally {
        btnText.textContent = '📡 抓取近 90 天數據';
        spinner.style.display = 'none';
    }
}

function runAnalysis() {
    const price = parseFloat(document.getElementById('price').value);
    const hi = parseFloat(document.getElementById('fibHigh').value);
    const lo = parseFloat(document.getElementById('fibLow').value);
    const fCost = parseFloat(document.getElementById('foreign').value) || 0;
    const tCost = parseFloat(document.getElementById('trust').value) || 0;

    if (!price || !hi || !lo) return alert('請填寫完整股價與高低點');
    document.getElementById('results').style.display = 'block';

    const range = hi - lo;
    // 完整斐波那契位階
    const fibLevels = [
        {r: 0, l: '起漲低點 (0%)'},
        {r: 0.236, l: '初步支撐 (23.6%)'},
        {r: 0.382, l: '強勢回調 (38.2%)'},
        {r: 0.5, l: '多空分界 (50%)'},
        {r: 0.618, l: '黃金分割 (61.8%)'},
        {r: 0.786, l: '深層回測 (78.6%)'},
        {r: 1, l: '波段高點 (100%)'},
        {r: 1.272, l: '多頭延伸 (127.2%)'},
        {r: 1.618, l: '獲利目標 (161.8%)'}
    ];
    
    let fibHTML = `<tr><th>位階</th><th>價格</th><th>信號</th></tr>`;
    fibLevels.forEach(lvl => {
        const lvlP = +(lo + range * lvl.r).toFixed(2);
        const dist = Math.abs(price - lvlP) / price;
        let signal = dist < 0.015 ? '<span style="color:var(--green)">⭐ 共振點</span>' : (price > lvlP ? '↑' : '↓');
        fibHTML += `<tr><td style="color:var(--gold)">${lvl.l}</td><td>$${lvlP}</td><td>${signal}</td></tr>`;
    });
    document.getElementById('fibTable').innerHTML = fibHTML;

    // 波浪進場邏輯
    let waveHTML = `<div class="section-title">🌊 波浪精算判定</div>`;
    const mainCost = tCost || fCost;
    if (mainCost) {
        const bPoint = (mainCost * 1.04).toFixed(2);
        const target1 = (mainCost * 1.2).toFixed(2);
        const target2 = (mainCost * 1.4).toFixed(2);
        const target3 = (mainCost * 1.7).toFixed(2);
        
        let msg = '';
        let cls = 'signal-wait';
        
        if (price < mainCost) {
            msg = '💎 處於成本區下方：收貨期。';
        } else if (price >= mainCost && price < bPoint) {
            msg = '⏳ 成本區震盪：等待 1.04 突破。';
        } else if (price >= bPoint && price < target1) {
            msg = '🚀 突破 1.04：主升段啟動！建議進場。';
            cls = 'signal-buy';
        } else if (price >= target1 && price < target2) {
            msg = '📈 抵達 1.2 目標：強勢持股，注意噴發。';
        } else if (price >= target2) {
            msg = '💰 抵達 1.4 以上：滿足區，分批入袋。';
            cls = 'signal-sell';
        }

        waveHTML += `<div class="signal-box ${cls}">${msg}</div>
            <div style="font-size:12px; margin-top:12px; color:var(--dim); line-height:1.8;">
                • 法人成本突破：$${bPoint}<br>
                • 第一目標(1.2)：$${target1}<br>
                • 第二目標(1.4)：$${target2}<br>
                • 最終目標(1.7)：$${target3}
            </div>`;
    } else {
        waveHTML += `<div class="signal-box signal-wait">請輸入法人成本以分析波浪階段</div>`;
    }
    document.getElementById('waveOutput').innerHTML = waveHTML;

    document.getElementById('signalSummary').innerHTML = `
        <div class="section-title">🏮 發財分析總結</div>
        <div style="text-align:center; padding:10px;">
            <div style="font-size:36px;">${price > hi ? '🔥' : '📈'}</div>
            <div style="color:var(--gold); font-weight:900; font-size:18px; margin-top:8px;">
                ${price > hi ? '開啟噴發模式' : '高位震盪蓄力'}
            </div>
        </div>
    `;
}
</script>
</body>
</html>
