<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>💰 發財一路發 (穩定自動版)</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; background: #0d0f14; font-family: -apple-system, system-ui, sans-serif; -webkit-font-smoothing: antialiased; color: #e8eaf0; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: transparent; color: #6b7280; font-weight: 700; cursor: pointer; transition: 0.3s; border-radius: 8px; }
        .tab-btn.active { background: #1c2030; color: #ff6b9d; box-shadow: 0 4px 15px rgba(255,107,157,0.2); }
        .fetch-btn { width: 100%; background: linear-gradient(135deg, #ff6b9d, #a855f7); border: none; border-radius: 12px; color: #fff; padding: 14px; font-weight: 800; cursor: pointer; margin-bottom: 15px; transition: 0.2s; }
        .fetch-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const C = {
            bg: "#0d0f14", surface: "#161921", card: "#1c2030", border: "#2a2f3e",
            pink: "#ff6b9d", green: "#4ade80", red: "#f87171", yellow: "#fbbf24",
            blue: "#60a5fa", gold: "#ffd700", text: "#e8eaf0", dim: "#9ca3af",
        };

        function App() {
            const [mode, setMode] = useState("strong");
            const [symbol, setSymbol] = useState("");
            const [price, setPrice] = useState("");
            const [cost, setCost] = useState("");
            const [high, setHigh] = useState("");
            const [low, setLow] = useState("");
            const [loading, setLoading] = useState(false);

            // 自動抓取近一個月高低點
            const autoFetch = async () => {
                if (!symbol || symbol.length < 4) { alert("請輸入 4 位數台股代號"); return; }
                setLoading(true);
                try {
                    const start = new Date(Date.now() - 35 * 86400000).toISOString().split('T')[0];
                    const url = `https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockPrice&data_id=${symbol}&start_date=${start}`;
                    const res = await fetch(url);
                    const json = await res.json();
                    
                    if (json.data && json.data.length > 0) {
                        const d = json.data;
                        const latest = d[d.length - 1];
                        const h = Math.max(...d.map(x => x.high));
                        const l = Math.min(...d.map(x => x.low));

                        setPrice(String(latest.close));
                        setHigh(String(h));
                        setLow(String(l));
                    } else { alert("查無數據，請確認代號正確"); }
                } catch (e) { alert("連線失敗"); }
                setLoading(false);
            };

            const renderResults = () => {
                const p = parseFloat(price);
                if (isNaN(p)) return <div style={{textAlign:'center', color:C.dim, marginTop:20}}>請輸入代號並抓取數據</div>;

                if (mode === "strong") {
                    const base = cost ? parseFloat(cost) : p;
                    const lv = { start: base * 1.04, rest: base * 1.2, target: base * 1.4, peak: base * 1.7 };
                    return (
                        <div style={{background: C.card, padding: 20, borderRadius: 16, border: `1px solid ${C.border}`}}>
                            <div style={{fontSize: 12, color: C.dim, marginBottom: 10}}>基準成本: ${base.toFixed(2)}</div>
                            {[{t:"發動點",v:lv.start,c:C.blue},{t:"休息區",v:lv.rest,c:C.yellow},{t:"目標區",v:lv.target,c:C.green},{t:"韭菜區",v:lv.peak,c:C.red}].map(i => (
                                <div key={i.t} style={{display:"flex",justifyContent:"space-between",padding:"12px 0",borderBottom:`1px solid ${C.border}`}}>
                                    <span style={{color:C.dim}}>{i.t}</span>
                                    <span style={{fontWeight:700, color: i.c}}>${i.v.toFixed(2)}</span>
                                </div>
                            ))}
                        </div>
                    );
                } else {
                    const h = parseFloat(high), l = parseFloat(low);
                    if (isNaN(h) || isNaN(l)) return null;
                    const d = h - l;
                    const fibs = [
                        { l: "壓力區 (1.382)", v: l + d * 1.382, c: C.red },
                        { l: "目標區 (1.618)", v: l + d * 1.618, c: C.pink },
                        { l: "黃金分割 (0.618)", v: l + d * 0.618, c: C.gold },
                        { l: "中軸支撐 (0.500)", v: l + d * 0.5, c: C.blue },
                        { l: "強勢支撐 (0.382)", v: l + d * 0.382, c: C.green }
                    ];
                    return (
                        <div style={{background: C.card, padding: 20, borderRadius: 16, border: `1px solid ${C.border}`}}>
                            {fibs.map(f => (
                                <div key={f.l} style={{display:"flex",justifyContent:"space-between",padding:"12px 0",borderBottom:`1px solid ${C.border}`}}>
                                    <span style={{color:C.dim}}>{f.l}</span>
                                    <span style={{fontWeight:900, color: f.c}}>${f.v.toFixed(2)}</span>
                                </div>
                            ))}
                        </div>
                    );
                }
            };

            return (
                <div style={{ background: C.bg, minHeight: "100vh", padding: "24px 16px" }}>
                    <div style={{textAlign: "center", marginBottom: 20}}>
                        <div style={{fontSize: 10, color: C.pink, letterSpacing: 3}}>168 FINANCE LAB</div>
                        <h1 style={{margin: "10px 0", fontSize: 28}}>發財整合精算機</h1>
                    </div>

                    <div style={{display: "flex", background: C.surface, padding: "4px", borderRadius: 12, marginBottom: 20}}>
                        <button className={`tab-btn ${mode === 'strong' ? 'active' : ''}`} onClick={() => setMode('strong')}>🐰 強勢股</button>
                        <button className={`tab-btn ${mode === 'fibo' ? 'active' : ''}`} onClick={() => setMode('fibo')}>📊 費波那契</button>
                    </div>

                    <div style={{background: C.card, padding: 20, borderRadius: 16, border: `1px solid ${C.border}`, marginBottom: 16}}>
                        <input style={{width:"100%", background:C.surface, border:`1px solid ${C.border}`, borderRadius:10, padding:14, color:"#fff", marginBottom:12, boxSizing:"border-box", fontSize:17}} 
                               placeholder="輸入代號 (例: 3481)" value={symbol} onChange={e => setSymbol(e.target.value)} />
                        
                        <button className="fetch-btn" onClick={autoFetch} disabled={loading}>
                            {loading ? "數據抓取中..." : "🔍 一鍵抓取波段高低點"}
                        </button>

                        <div style={{display:"flex", gap:10}}>
                            <div style={{flex:1}}>
                                <span style={{fontSize:11, color:C.dim}}>當前現價</span>
                                <input style={{width:"100%", background:C.surface, border:`1px solid ${C.border}`, borderRadius:10, padding:12, color:"#fff", boxSizing:"border-box"}} 
                                       type="number" value={price} onChange={e => setPrice(e.target.value)} />
                            </div>
                            {mode === 'strong' ? (
                                <div style={{flex:1}}>
                                    <span style={{fontSize:11, color:C.dim}}>主力成本</span>
                                    <input style={{width:"100%", background:C.surface, border:`1px solid ${C.border}`, borderRadius:10, padding:12, color:"#fff", boxSizing:"border-box"}} 
                                           type="number" value={cost} onChange={e => setCost(e.target.value)} />
                                </div>
                            ) : (
                                <>
                                    <div style={{flex:1}}><span style={{fontSize:11, color:C.dim}}>高點</span><input style={{width:"100%", background:C.surface, border:`1px solid ${C.border}`, borderRadius:10, padding:12, color:"#fff", boxSizing:"border-box"}} type="number" value={high} onChange={e => setHigh(e.target.value)} /></div>
                                    <div style={{flex:1}}><span style={{fontSize:11, color:C.dim}}>低點</span><input style={{width:"100%", background:C.surface, border:`1px solid ${C.border}`, borderRadius:10, padding:12, color:"#fff", boxSizing:"border-box"}} type="number" value={low} onChange={e => setLow(e.target.value)} /></div>
                                </>
                            )}
                        </div>
                    </div>

                    {renderResults()}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
