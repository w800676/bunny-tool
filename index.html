<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fortune Stock FinMind 版</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0d11;
    --surface: #15181f;
    --card: #1c2029;
    --border: #2d323d;
    --accent-gold: #f5c842;
    --accent-purple: #b48eff;
    --accent-green: #4ade80;
    --accent-red: #f87171;
    --text-main: #f5f5f5;
    --text-muted: #8a8f9d;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text-main); font-family: 'Noto Sans TC', sans-serif; padding: 20px 15px 80px; }
  .app-header { text-align: center; margin-bottom: 20px; }
  .app-header h1 { font-size: 24px; font-weight: 900; background: linear-gradient(to right, #fff, var(--accent-gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .app-header p { font-size: 11px; color: var(--text-muted); letter-spacing: 1px; }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 20px; margin-bottom: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
  .card-title { font-size: 13px; font-weight: 700; color: var(--accent-gold); margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
  
  .input-label { display: block; font-size: 11px; color: var(--text-muted); margin-bottom: 6px; }
  input { background: #0b0d11; border: 1px solid var(--border); border-radius: 10px; color: var(--accent-gold); font-family: 'DM Mono', monospace; font-size: 16px; padding: 12px; width: 100%; outline: none; transition: 0.3s; }
  input:focus { border-color: var(--accent-gold); box-shadow: 0 0 10px rgba(245,200,66,0.1); }
  
  .btn-fetch { width: 100%; background: #1a1e26; border: 1px dashed var(--accent-gold); border-radius: 12px; color: var(--accent-gold); padding: 12px; font-size: 13px; font-weight: 700; cursor: pointer; margin: 15px 0; transition: 0.3s; }
  .btn-fetch:active { transform: scale(0.98); }
  .btn-analyze { width: 100%; background: linear-gradient(135deg, #f5c842, #d4a72d); border: none; border-radius: 14px; color: #000; padding: 16px; font-size: 16px; font-weight: 900; letter-spacing: 2px; cursor: pointer; }

  .status-box { text-align: center; padding: 25px; border-radius: 20px; border: 1px solid var(--accent-gold); background: radial-gradient(circle at top, #252a36, #1c2029); margin-bottom: 20px; }
  .fib-table { width: 100%; border-collapse: collapse; font-family: 'DM Mono', monospace; font-size: 13px; }
  .fib-table tr { border-bottom: 1px solid var(--border); }
  .fib-table td { padding: 14px 8px; vertical-align: middle; }
  .price-text { font-weight: 700; color: var(--text-main); }
  .target-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; text-align: center; }
  .target-item { background: #0b0d11; padding: 12px 5px; border-radius: 12px; border: 1px solid var(--border); }
  .target-label { font-size: 10px; color: var(--text-muted); margin-bottom: 4px; }
  .target-val { font-size: 14px; font-weight: 700; color: var(--accent-gold); }

  /* 新增策略標籤樣式 */
  .strat-tag { font-size: 9px; padding: 2px 6px; border-radius: 4px; display: inline-block; margin-top: 4px; font-weight: bold; }
  .tag-entry { background: rgba(74,222,128,0.15); color: #4ade80; border: 0.5px solid #4ade80; }
  .tag-hold { background: rgba(245,200,66,0.15); color: #f5c842; border: 0.5px solid #f5c842; }
  .tag-exit { background: rgba(248,113,113,0.15); color: #f87171; border: 0.5px solid #f87171; }
</style>
</head>
<body>

<div class="app-header">
  <p>PROFESSIONAL FINMIND SYSTEM</p>
  <h1>發財強勢股精算 3.0</h1>
</div>

<div class="card">
  <div class="card-title">📡 數據自動抓取 (FinMind 介接)</div>
  <label class="input-label">股票代號 (如: 2330)</label>
  <input type="text" id="ticker" placeholder="輸入 4 位台股代號">
  
  <button class="btn-fetch" id="btnFetch" onclick="fetchFinMindData()">📡 啟動專業 API 抓取</button>

  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
    <div><label class="input-label">當前現價</label><input type="number" id="price" step="0.01"></div>
    <div><label class="input-label">法人成本</label><input type="number" id="cost" step="0.01" placeholder="外資或投信"></div>
  </div>
  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 12px;">
    <div><label class="input-label">波段低點 (3個月)</label><input type="number" id="low" step="0.01"></div>
    <div><label class="input-label">波段高點 (3個月)</label><input type="number" id="high" step="0.01"></div>
  </div>

  <button class="btn-analyze" style="margin-top:20px;" onclick="runAnalysis()">🧧 開始發財精算</button>
</div>

<div id="analysisResult" style="display:none;">
  <div class="status-box" id="statusBox"></div>

  <div class="card">
    <div class="card-title">📐 斐波那契進出場判斷</div>
    <table class="fib-table" id="fibTable"></table>
  </div>

  <div class="card">
    <div class="card-title">🌊 法人波浪目標位</div>
    <div class="target-grid" id="waveTargets"></div>
  </div>
</div>

<script>
const FINMIND_TOKEN = "eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJ1c2VyX2lkIjoiaHVhbmc4MDY3NiIsImVtYWlsIjoidzgwMDY3NkBnbWFpbC5jb20ifQ.k7BlAxav_GxT_tchaXAyuDafq_hIV01eUSzk2H_cZBQ";

function calcEntryTiming(price, cost) {
  const bt = +(cost * 1.04).toFixed(2);
  const g1 = +(cost * 1.2).toFixed(2);
  const g2 = +(cost * 1.4).toFixed(2);
  const g3 = +(cost * 1.7).toFixed(2);

  if (price < cost) return {
    phase: "法人收貨期", phaseIdx: 0, signal: "禁止進場", emoji: "🚫", color: "var(--accent-red)", canEnter: false,
    entry: null, stopLoss: null, target: cost,
    timing: `現價低於法人成本 $${cost}，法人仍在壓低收貨。等現價站上成本後再觀察。`,
    rule: "不該進場：現價低於法人成本，沒有波浪基礎。"
  };
  if (price < bt) return {
    phase: "突破前蓄力", phaseIdx: 1, signal: "等待突破", emoji: "👀", color: "var(--accent-gold)", canEnter: false,
    entry: bt, stopLoss: +(cost * 0.97).toFixed(2), target: g1,
    timing: `現價距突破點 $${bt} 還差 ${(((bt - price) / price) * 100).toFixed(1)}%。等放量突破後才是進場點。`,
    rule: "尚未突破：等量能訊號出現。"
  };
  if (price < g1) {
    const fromBt = (((price - bt) / bt) * 100).toFixed(1);
    const isEarly = fromBt <= 3;
    return {
      phase: "第一波啟動", phaseIdx: 2, signal: isEarly ? "第一進場點" : "等盤整加碼", emoji: isEarly ? "🟢" : "📊", color: "var(--accent-green)", canEnter: isEarly,
      entry: isEarly ? price : null, stopLoss: +(bt * 0.98).toFixed(2), target: g1,
      timing: isEarly ? `剛突破 $${bt}，為第一進場點。停損設 $${+(bt * 0.98).toFixed(2)}。` : `已上漲 ${fromBt}%，追高風險較高。等縮量回踩後再進。`,
      rule: isEarly ? "最佳買點：剛突破成本 4%。" : "等盤整：漲幅已過 3%，不宜硬追。"
    };
  }
  if (price < g2) {
    const fromG1 = (((price - g1) / g1) * 100).toFixed(1);
    const isEarly = fromG1 <= 3;
    return {
      phase: "第二波推升", phaseIdx: 3, signal: isEarly ? "關卡突破加碼" : "等盤整後進", emoji: isEarly ? "🚀" : "⏳", color: "var(--accent-green)", canEnter: isEarly,
      entry: isEarly ? price : null, stopLoss: +(g1 * 0.97).toFixed(2), target: g2,
      timing: isEarly ? `突破關卡一 $${g1}，波段加碼機會。目標 $${g2}。` : `過關卡一後上漲 ${fromG1}%，等 3-5 日盤整縮量。`,
      rule: isEarly ? "加碼時機：剛突破關卡一。" : "等盤整：等關卡一回踩完畢。"
    };
  }
  if (price < g3) {
    const fromG2 = (((price - g2) / g2) * 100).toFixed(1);
    const isEarly = fromG2 <= 3;
    return {
      phase: "第三波衝刺", phaseIdx: 4, signal: isEarly ? "最後加碼" : "分批出場", emoji: isEarly ? "🏔️" : "🔔", color: isEarly ? "var(--accent-gold)" : "var(--accent-red)", canEnter: isEarly,
      entry: isEarly ? price : null, stopLoss: +(g2 * 0.97).toFixed(2), target: g3,
      timing: isEarly ? `突破關卡二 $${g2}，最後加碼但風險已高。` : `接近關卡三 $${g3}，空手者禁進，持有者準備出場。`,
      rule: "末升段：風險報酬比已降低。"
    };
  }
  return {
    phase: "高點區域", phaseIdx: 5, signal: "禁止追買", emoji: "🔴", color: "var(--accent-red)", canEnter: false,
    entry: null, stopLoss: null, target: null,
    timing: `現價已達關卡三 $${g3} (1.7倍)，歷史高點區。請分批獲利了結。`,
    rule: "韭菜陷阱：已達最高目標，隨時回檔。"
  };
}

async function fetchFinMindData() {
    const ticker = document.getElementById('ticker').value.trim();
    if (!ticker) return alert('請輸入股票代號');
    const btn = document.getElementById('btnFetch');
    btn.textContent = '🚀 FinMind 數據同步中...';
    const endDate = new Date().toISOString().split('T')[0];
    const startDate = new Date(new Date().setDate(new Date().getDate() - 95)).toISOString().split('T')[0];

    try {
        const url = `https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockPrice&data_id=${ticker}&start_date=${startDate}&end_date=${endDate}&token=${FINMIND_TOKEN}`;
        const response = await fetch(url);
        const json = await response.json();
        if (json.status !== 200 || !json.data || json.data.length === 0) throw new Error('查無數據');
        const data = json.data;
        document.getElementById('price').value = data[data.length - 1].close;
        document.getElementById('high').value = Math.max(...data.map(d => d.max)).toFixed(2);
        document.getElementById('low').value = Math.min(...data.map(d => d.min)).toFixed(2);
        btn.textContent = '✅ 專業同步成功';
        setTimeout(() => { btn.textContent = '📡 啟動專業 API 抓取'; }, 2000);
    } catch (e) {
        alert('❌ 抓取失敗');
        btn.textContent = '❌ 同步失敗';
    }
}

function runAnalysis() {
    const p = parseFloat(document.getElementById('price').value);
    const hi = parseFloat(document.getElementById('high').value);
    const lo = parseFloat(document.getElementById('low').value);
    const cost = parseFloat(document.getElementById('cost').value);
    
    if (!p || !hi || !lo) return alert('核心價格數據不足');
    document.getElementById('analysisResult').style.display = 'block';

    const range = hi - lo;
    // 增加 1.13, 1.272, 1.382
    const fibRatios = [
        { r: 0, l: "起漲點", role: "強力支撐", strat: "起漲底線", tag: "tag-hold" },
        { r: 0.382, l: "38.2%", role: "強勢回調", strat: "破位停損", tag: "tag-exit" },
        { r: 0.5, l: "50.0%", role: "多空分界", strat: "多空關鍵", tag: "tag-hold" },
        { r: 0.618, l: "61.8%", role: "黃金比例", strat: "波段進場點", tag: "tag-entry" },
        { r: 0.786, l: "78.6%", role: "深層回測", strat: "最後防線", tag: "tag-exit" },
        { r: 1, l: "波段高點", role: "短線壓力", strat: "前高阻力", tag: "tag-hold" },
        { r: 1.13, l: "113.0%", role: "假突破點", strat: "減碼觀察", tag: "tag-exit" },
        { r: 1.272, l: "127.2%", role: "噴發首位", strat: "分批獲利", tag: "tag-exit" },
        { r: 1.382, l: "138.2%", role: "二波擴展", strat: "強勢停利", tag: "tag-exit" },
        { r: 1.618, l: "噴發目標", role: "終極停利🥇", strat: "全數出場", tag: "tag-exit" }
    ];

    let fibHTML = "";
    fibRatios.forEach(f => {
        const val = lo + range * f.r;
        const isNear = Math.abs(p - val) / p < 0.015;
        
        fibHTML += `
            <tr>
                <td>
                    <span style="font-size:10px; color:var(--text-muted)">${f.l}</span><br>
                    <span style="font-weight:500;">${f.role}</span><br>
                    <span class="strat-tag ${f.tag}">${f.strat}</span>
                </td>
                <td class="price-text">$${val.toFixed(2)}</td>
                <td style="color:${isNear ? 'var(--accent-green)' : (p > val ? 'var(--accent-red)' : 'var(--text-muted)')}; font-size:11px;">
                    ${isNear ? '🎯 價格在此' : (p > val ? '▲ 支撐' : '▼ 壓力')}
                </td>
            </tr>`;
    });
    document.getElementById('fibTable').innerHTML = fibHTML;

    if (cost) {
        const timing = calcEntryTiming(p, cost);
        const phases = ["收貨期", "蓄力", "第一波", "第二波", "第三波", "高點"];
        const phaseColors = ['#f87171', '#f5c842', '#4ade80', '#4ade80', '#f5c842', '#f87171'];

        let stepBarHTML = `<div style="display:flex; gap:6px; margin-bottom:20px;">`;
        phases.forEach((name, idx) => {
            const isActive = idx === timing.phaseIdx;
            const barColor = isActive ? phaseColors[idx] : '#2d323d';
            stepBarHTML += `<div style="flex:1; text-align:center;"><div style="height:4px; background:${barColor}; border-radius:2px; opacity:${isActive ? '1' : '0.2'}; margin-bottom:8px;"></div><div style="font-size:10px; color:${isActive ? '#fff' : 'var(--text-muted)'}">${name}</div></div>`;
        });
        stepBarHTML += `</div>`;

        document.getElementById('statusBox').innerHTML = `
            ${stepBarHTML}
            <div style="background:rgba(255,255,255,0.03); border-radius:14px; padding:18px; border-left:4px solid ${timing.color}; text-align:left;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                    <div><span style="font-size:20px; font-weight:900; color:${timing.color};">${timing.emoji} ${timing.signal}</span><div style="font-size:12px; color:var(--text-muted);">${timing.phase}</div></div>
                    <div style="background:${timing.canEnter ? 'rgba(74,222,128,0.1)' : 'rgba(248,113,113,0.1)'}; color:${timing.canEnter ? '#4ade80' : '#f87171'}; padding:4px 12px; border-radius:20px; font-size:12px; border:1px solid;">${timing.canEnter ? '可進場' : '不建議'}</div>
                </div>
                <p style="font-size:13px; line-height:1.6; color:#d1d5db;">${timing.timing}</p>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-top:15px;">
                <div class="target-item"><div class="target-label">建議買點</div><div class="target-val" style="color:var(--accent-green)">${timing.entry ? '$'+timing.entry : '--'}</div></div>
                <div class="target-item"><div class="target-label">停損參考</div><div class="target-val" style="color:var(--accent-red)">${timing.stopLoss ? '$'+timing.stopLoss : '--'}</div></div>
                <div class="target-item"><div class="target-label">波段目標</div><div class="target-val">${timing.target ? '$'+timing.target : '--'}</div></div>
            </div>
            <div style="margin-top:15px; font-size:12px; color:var(--text-muted); background:rgba(0,0,0,0.2); padding:10px; border-radius:10px; text-align:left;">💡 ${timing.rule}</div>
        `;
        document.getElementById('statusBox').style.borderColor = timing.color;

        const t1 = cost * 1.04; const t2 = cost * 1.2; const t3 = cost * 1.4;
        document.getElementById('waveTargets').innerHTML = `
            <div class="target-item"><div class="target-label">突破點 1.04</div><div class="target-val">$${t1.toFixed(2)}</div></div>
            <div class="target-item"><div class="target-label">目標一 1.20</div><div class="target-val" style="color:var(--accent-purple)">$${t2.toFixed(2)}</div></div>
            <div class="target-item"><div class="target-label">目標二 1.40</div><div class="target-val" style="color:var(--accent-red)">$${t3.toFixed(2)}</div></div>`;
    } else {
        document.getElementById('statusBox').innerHTML = `<div style="font-size:48px; margin-bottom:10px;">⚖️</div><div style="font-size:24px; font-weight:900; color:var(--accent-gold)">區間觀察中</div><div style="font-size:12px; color:var(--text-muted); margin-top:10px;">請輸入「法人成本」以利系統進行波浪進場判斷。</div>`;
        document.getElementById('waveTargets').innerHTML = '<p style="color:var(--text-muted); font-size:12px; grid-column: 1/4;">輸入法人成本顯示目標</p>';
    }

    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}
</script>
</body>
</html>
