<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>💰 發財一路發財經實驗室</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; background: #0d0f14; font-family: -apple-system, system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const C = {
            bg: "#0d0f14", surface: "#161921", card: "#1c2030", border: "#2a2f3e",
            pink: "#ff6b9d", green: "#4ade80", red: "#f87171", yellow: "#fbbf24",
            blue: "#60a5fa", purple: "#a78bfa", text: "#e8eaf0", muted: "#6b7280", dim: "#9ca3af",
        };

        const s = {
            wrap: { background: C.bg, minHeight: "100vh", padding: "24px 16px 80px", color: C.text },
            headerTag: { display: "inline-block", fontSize: 10, letterSpacing: 3, color: C.pink, border: `1px solid ${C.pink}`, padding: "4px 12px", borderRadius: 20, marginBottom: 12, textTransform: "uppercase" },
            h1: { fontSize: "28px", fontWeight: 900, marginBottom: 20, textAlign: "center", background: `linear-gradient(135deg,#fff 0%,${C.pink} 60%)`, WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" },
            section: { background: C.card, border: `1px solid ${C.border}`, borderRadius: 16, padding: 20, marginBottom: 16 },
            input: { background: C.surface, border: `1px solid ${C.border}`, borderRadius: 10, color: C.text, fontSize: 18, padding: "14px", outline: "none", width: "100%", boxSizing: "border-box", marginBottom: 12, fontWeight: "700" },
            btn: { width: "100%", background: `linear-gradient(135deg,${C.pink},${C.purple})`, border: "none", borderRadius: 14, color: "#fff", fontSize: 16, fontWeight: 700, padding: 16, marginTop: 8, cursor: "pointer" },
            statusBox: (bg) => ({ padding: "16px", borderRadius: 12, background: bg, textAlign: "center", marginBottom: 20, border: `1px solid rgba(255,255,255,0.1)` }),
            badge: (active) => ({ display: "inline-flex", fontSize: 11, padding: "2px 8px", borderRadius: 4, background: active ? `${C.green}22` : `${C.muted}11`, color: active ? C.green : C.muted, border: `1px solid ${active ? C.green : C.muted}44` })
        };

        function App() {
            const [name, setName] = useState("");
            const [price, setPrice] = useState("");
            const [cost, setCost] = useState("");
            const [result, setResult] = useState(null);

            // 自動計算邏輯
            useEffect(() => {
                const p = parseFloat(price);
                if (!p || isNaN(p)) {
                    setResult(null);
                    return;
                }

                const base = cost ? parseFloat(cost) : p;
                const levels = {
                    start: base * 1.04,
                    rest: base * 1.2,
                    target: base * 1.4,
                    peak: base * 1.7
                };

                let status = { text: "等待觀察", advice: "尚未突破發動點", color: C.muted, bg: "#2a2f3e33" };
                if (p >= levels.peak) status = { text: "🚫 終極韭菜區", advice: "風險極高，嚴禁追高", color: C.red, bg: `${C.red}22` };
                else if (p >= levels.target) status = { text: "⚡ 末升段挑戰", advice: "注意回檔風險", color: C.yellow, bg: `${C.yellow}22` };
                else if (p >= levels.rest) status = { text: "🚀 主升段進行中", advice: "動能強勁，持股續抱", color: C.green, bg: `${C.green}22` };
                else if (p >= levels.start) status = { text: "🌱 初試啼聲", advice: "剛過發動點，適合佈局", color: C.blue, bg: `${C.blue}22` };

                setResult({ p, base, levels, status, isAutoBase: !cost });
            }, [price, cost]);

            return (
                <div style={s.wrap}>
                    <div style={{textAlign: "center"}}>
                        <div style={s.headerTag}>168 Finance Lab</div>
                        <div style={s.h1}>發財強勢股精算系統</div>
                    </div>

                    <div style={s.section}>
                        <div style={{color: C.pink, fontSize: 13, fontWeight: 700, marginBottom: 12, display: 'flex', alignItems: 'center', gap: '5px'}}>
                           📊 核心數據輸入
                        </div>
                        <input style={s.input} type="text" placeholder="股票名稱 / 代號 (選填)" value={name} onChange={e => setName(e.target.value)} />
                        <input style={s.input} type="number" placeholder="當前現價 (必填)" value={price} onChange={e => setPrice(e.target.value)} />
                        <input style={s.input} type="number" placeholder="主力成本 (沒填則以現價計算)" value={cost} onChange={e => setCost(e.target.value)} />
                        <button style={s.btn} onClick={() => {}}>開始發財分析</button>
                    </div>

                    {result && (
                        <div style={s.section}>
                            <div style={s.statusBox(result.status.bg)}>
                                <div style={{fontSize: 14, color: C.dim, marginBottom: 4}}>{name || "該股"} 目前時機</div>
                                <div style={{fontSize: 24, fontWeight: 900, color: result.status.color, marginBottom: 8}}>{result.status.text}</div>
                                <div style={{fontSize: 13, color: C.text, opacity: 0.8}}>{result.status.advice}</div>
                            </div>

                            <div style={{color: C.pink, fontSize: 13, fontWeight: 700, marginBottom: 10}}>
                                基準點：${result.base.toFixed(2)} {result.isAutoBase ? "(依現價推算)" : "(依成本計算)"}
                            </div>
                            {[
                                { l: "突破發動點", v: result.levels.start, m: "1.04x" },
                                { l: "一路發休息區", v: result.levels.rest, m: "1.20x" },
                                { l: "財富自由區", v: result.levels.target, m: "1.40x" },
                                { l: "終極韭菜區", v: result.levels.peak, m: "1.70x" }
                            ].map(lv => (
                                <div key={lv.l} style={{display: "flex", justifyContent: "space-between", padding: "14px 0", borderBottom: `1px solid ${C.border}`}}>
                                    <span style={{fontSize: 14, color: C.dim}}>{lv.l}</span>
                                    <span style={{fontSize: 16, fontWeight: 700, color: result.p >= lv.v ? C.green : C.text}}>${lv.v.toFixed(2)}</span>
                                    <span style={s.badge(result.p >= lv.v)}>{result.p >= lv.v ? "已過" : "待破"}</span>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
