<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>💰 發財一路發 (穩定修復版)</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; background: #0d0f14; font-family: -apple-system, system-ui, sans-serif; color: #e8eaf0; }
        .container { min-height: 100vh; padding: 20px; box-sizing: border-box; }
        .card { background: #1c2030; border: 1px solid #2a2f3e; borderRadius: 16px; padding: 20px; margin-bottom: 15px; }
        input { width: 100%; background: #161921; border: 1px solid #2a2f3e; borderRadius: 10px; padding: 12px; color: #fff; margin-bottom: 10px; boxSizing: border-box; outline: none; font-size: 16px; }
        .fetch-btn { width: 100%; background: linear-gradient(135deg, #6366f1, #a855f7); border: none; borderRadius: 12px; color: #fff; padding: 14px; font-weight: 700; cursor: pointer; margin-bottom: 15px; }
        .fetch-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: transparent; color: #6b7280; font-weight: 700; cursor: pointer; }
        .tab-btn.active { background: #1c2030; color: #ff6b9d; borderRadius: 8px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [mode, setMode] = useState("strong");
            const [symbol, setSymbol] = useState("");
            const [price, setPrice] = useState("");
            const [high, setHigh] = useState("");
            const [low, setLow] = useState("");
            const [loading, setLoading] = useState(false);

            const autoFetch = async () => {
                if (!symbol || symbol.length < 4) { alert("請輸入 4 位數代碼"); return; }
                setLoading(true);
                try {
                    const start = new Date(Date.now() - 40 * 86400000).toISOString().split('T')[0];
                    const url = `https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockPrice&data_id=${symbol}&start_date=${start}`;
                    
                    const res = await fetch(url);
                    const json = await res.json();
                    
                    if (json.data && json.data.length > 0) {
                        const d = json.data;
                        const latest = d[d.length - 1];
                        const h = Math.max(...d.map(x => x.high));
                        const l = Math.min(...d.map(x => x.low));

                        setPrice(latest.close.toString());
                        setHigh(h.toString());
                        setLow(l.toString());
                    } else {
                        alert("查無數據，請確認代號是否正確（例如 2330）");
                    }
                } catch (e) {
                    alert("網路連線錯誤，請稍後再試");
                }
                setLoading(false);
            };

            const renderResults = () => {
                const p = parseFloat(price);
                if (!p) return <div style={{textAlign:'center', color:'#9ca3af', marginTop:20}}>請輸入數據或點擊抓取</div>;

                if (mode === "strong") {
                    const start = p * 1.04;
                    const target = p * 1.4;
                    return (
                        <div className="card">
                            <div style={{display:'flex', justifyContent:'space-between', marginBottom:15}}>
                                <span>🚀 發動點 (1.04x)</span>
                                <span style={{color:'#60a5fa', fontWeight:700}}>${start.toFixed(2)}</span>
                            </div>
                            <div style={{display:'flex', justifyContent:'space-between'}}>
                                <span>🎯 目標區 (1.40x)</span>
                                <span style={{color:'#4ade80', fontWeight:700}}>${target.toFixed(2)}</span>
                            </div>
                        </div>
                    );
                } else {
                    const h = parseFloat(high), l = parseFloat(low);
                    if (!h || !l) return null;
                    const diff = h - l;
                    const fibs = [
                        { n: "目標 (1.618)", v: l + diff * 1.618, c: "#ff6b9d" },
                        { n: "壓力 (0.618)", v: l + diff * 0.618, c: "#ffd700" },
                        { n: "支撐 (0.382)", v: l + diff * 0.382, c: "#4ade80" }
                    ];
                    return (
                        <div className="card">
                            {fibs.map(f => (
                                <div key={f.n} style={{display:'flex', justifyContent:'space-between', padding:'10px 0', borderBottom:'1px solid #2a2f3e'}}>
                                    <span style={{color:'#9ca3af'}}>{f.n}</span>
                                    <span style={{color:f.c, fontWeight:700}}>${f.v.toFixed(2)}</span>
                                </div>
                            ))}
                        </div>
                    );
                }
            };

            return (
                <div className="container">
                    <h2 style={{textAlign:'center', marginBottom:20}}>💰 發財全功能</h2>
                    
                    <div style={{display:'flex', background:'#161921', padding:4, borderRadius:12, marginBottom:15}}>
                        <button className={`tab-btn ${mode==='strong'?'active':''}`} onClick={()=>setMode('strong')}>強勢股</button>
                        <button className={`tab-btn ${mode==='fibo'?'active':''}`} onClick={()=>setMode('fibo')}>費波那契</button>
                    </div>

                    <div className="card">
                        <input placeholder="股票代號 (例: 3481)" value={symbol} onChange={e=>setSymbol(e.target.value)} />
                        <button className="fetch-btn" onClick={autoFetch} disabled={loading}>
                            {loading ? "讀取中..." : "🔍 一鍵抓取波段數據"}
                        </button>
                        <div style={{fontSize:12, color:'#ff6b9d', marginBottom:8}}>手動微調</div>
                        <input type="number" placeholder="現價" value={price} onChange={e=>setPrice(e.target.value)} />
                        {mode === 'fibo' && (
                            <div style={{display:'flex', gap:10}}>
                                <input type="number" placeholder="高點" value={high} onChange={e=>setHigh(e.target.value)} />
                                <input type="number" placeholder="低點" value={low} onChange={e=>setLow(e.target.value)} />
                            </div>
                        )}
                    </div>

                    {renderResults()}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
