<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🐰 Bunny Finance Lab | 法人波浪分析系統</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; background: #0d0f14; font-family: -apple-system, system-ui, sans-serif; color: #e8eaf0; -webkit-font-smoothing: antialiased; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .container { max-width: 500px; margin: 0 auto; padding: 24px 16px 80px; }
        .fetch-btn { width: 100%; background: linear-gradient(135deg, #ff6b9d 0%, #a78bfa 100%); border: none; border-radius: 14px; color: #fff; padding: 16px; font-weight: 800; cursor: pointer; font-size: 16px; margin-top: 10px; transition: 0.2s; box-shadow: 0 4px 15px rgba(255, 107, 157, 0.3); }
        .fetch-btn:active { transform: scale(0.97); }
        .fetch-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        /* 這裡放你提供的 C 物件轉換成的 CSS 變數 */
        :root { --pink: #ff6b9d; --border: #2a2f3e; --card: #1c2030; --surface: #161921; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useCallback } = React;

        const C = {
            bg: "#0d0f14", surface: "#161921", card: "#1c2030", border: "#2a2f3e",
            pink: "#ff6b9d", green: "#4ade80", red: "#f87171", yellow: "#fbbf24",
            blue: "#60a5fa", purple: "#a78bfa", text: "#e8eaf0", muted: "#6b7280", dim: "#9ca3af",
        };

        // --- 核心計算邏輯 ( calcEntryTiming ) ---
        function calcEntryTiming(price, cost) {
            const bt = +(cost * 1.04).toFixed(2);
            const g1 = +(cost * 1.2).toFixed(2);
            const g2 = +(cost * 1.4).toFixed(2);
            const g3 = +(cost * 1.7).toFixed(2);

            if (price < cost) return { phase: "法人收貨期", color: C.red, emoji: "🚫", signal: "禁止進場", canEnter: false, phaseIdx: 0, timing: "現價低於法人成本，趨勢未形成。" };
            if (price < bt) return { phase: "突破前蓄力", color: C.yellow, emoji: "👀", signal: "等待突破", canEnter: false, phaseIdx: 1, timing: `距突破點 $${bt} 尚差 ${(((bt-price)/price)*100).toFixed(1)}%` };
            if (price < g1) return { phase: "第一波啟動", color: C.green, emoji: "🟢", signal: "第一進場點", canEnter: true, phaseIdx: 2, timing: "已突破 1.04 倍，多頭啟動。" };
            if (price < g2) return { phase: "第二波推升", color: C.green, emoji: "🚀", signal: "強勢加碼區", canEnter: true, phaseIdx: 3, timing: "朝目標關卡二 $"+g2+" 前進。" };
            return { phase: "高點區域", color: C.red, emoji: "🔴", signal: "分批減碼", canEnter: false, phaseIdx: 4, timing: "已進入韭菜區，不宜追高。" };
        }

        // --- 子元件: 進場卡片 ---
        function EntryTimingCard({ cost, price, label, color }) {
            const t = calcEntryTiming(price, cost);
            const phases = ["收貨", "蓄力", "第一波", "第二波", "高點"];
            return (
                <div style={{ marginBottom: 20, background: C.surface, padding: 16, borderRadius: 12, border: `1px solid ${C.border}` }}>
                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 12 }}>
                        <span style={{ color, fontWeight: 800, fontSize: 13 }}>{label}成本波浪分析</span>
                        <span style={{ color: C.dim, fontSize: 11 }}>基準 ${cost}</span>
                    </div>
                    <div style={{ display: "flex", gap: 4, marginBottom: 15 }}>
                        {phases.map((p, i) => (
                            <div key={i} style={{ flex: 1 }}>
                                <div style={{ height: 4, borderRadius: 2, background: i === t.phaseIdx ? t.color : C.border, marginBottom: 4 }} />
                                <div style={{ fontSize: 9, textAlign: 'center', color: i === t.phaseIdx ? C.text : C.muted }}>{p}</div>
                            </div>
                        ))}
                    </div>
                    <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                        <span style={{ fontSize: 24 }}>{t.emoji}</span>
                        <div>
                            <div style={{ color: t.color, fontWeight: 900, fontSize: 16 }}>{t.signal}</div>
                            <div style={{ color: C.dim, fontSize: 12 }}>{t.timing}</div>
                        </div>
                    </div>
                </div>
            );
        }

        // --- 主程式 App ---
        function App() {
            const [code, setCode] = useState("");
            const [price, setPrice] = useState("");
            const [foreign, setForeign] = useState("");
            const [trust, setTrust] = useState("");
            const [major, setMajor] = useState("");
            const [loading, setLoading] = useState(false);
            const [active, setActive] = useState(false);

            const fetchAutoData = async () => {
                if (!code) return alert("請輸入代號");
                setLoading(true);
                try {
                    const start = new Date(Date.now() - 10 * 86400000).toISOString().split('T')[0];
                    const url = `https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockPrice&data_id=${code}&start_date=${start}`;
                    const res = await fetch(url);
                    const json = await res.json();
                    if (json.data && json.data.length > 0) {
                        setPrice(json.data[json.data.length - 1].close);
                        setActive(true);
                    } else { alert("查無代號"); }
                } catch (e) { alert("網路錯誤"); }
                setLoading(false);
            };

            return (
                <div className="container">
                    <div style={{ textAlign: "center", marginBottom: 30 }}>
                        <div style={{ display: "inline-block", fontSize: 11, letterSpacing: 3, color: C.pink, border: `1px solid ${C.pink}`, padding: "4px 12px", borderRadius: 20, marginBottom: 12 }}>BUNNY FINANCE</div>
                        <h1 style={{ margin: 0, fontSize: 28, fontWeight: 900 }}>波浪成本精算系統</h1>
                    </div>

                    <div style={{ background: C.card, padding: 20, borderRadius: 16, border: `1px solid ${C.border}`, marginBottom: 16 }}>
                        <div style={{ color: C.pink, fontSize: 13, fontWeight: 700, marginBottom: 15 }}>📊 數據輸入</div>
                        <input style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 10, color: C.text, padding: 14, width: "100%", boxSizing: "border-box", marginBottom: 12, fontSize: 16 }} 
                               placeholder="台股代號 (例: 2330)" value={code} onChange={e => setCode(e.target.value)} />
                        
                        <button className="fetch-btn" onClick={fetchAutoData} disabled={loading}>
                            {loading ? "數據連線中..." : "🚀 抓取即時數據並分析"}
                        </button>

                        <div style={{ display: "flex", gap: 10, marginTop: 15 }}>
                            <div style={{ flex: 1 }}>
                                <label style={{ fontSize: 11, color: C.dim }}>現價</label>
                                <input style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, color: C.text, padding: 10, width: "100%", boxSizing: "border-box" }} type="number" value={price} onChange={e => setPrice(e.target.value)} />
                            </div>
                            <div style={{ flex: 1 }}>
                                <label style={{ fontSize: 11, color: C.dim }}>外資成本</label>
                                <input style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, color: C.text, padding: 10, width: "100%", boxSizing: "border-box" }} type="number" value={foreign} onChange={e => setForeign(e.target.value)} />
                            </div>
                        </div>
                        <div style={{ display: "flex", gap: 10, marginTop: 10 }}>
                            <div style={{ flex: 1 }}>
                                <label style={{ fontSize: 11, color: C.dim }}>投信成本</label>
                                <input style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, color: C.text, padding: 10, width: "100%", boxSizing: "border-box" }} type="number" value={trust} onChange={e => setTrust(e.target.value)} />
                            </div>
                            <div style={{ flex: 1 }}>
                                <label style={{ fontSize: 11, color: C.dim }}>主力成本</label>
                                <input style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, color: C.text, padding: 10, width: "100%", boxSizing: "border-box" }} type="number" value={major} onChange={e => setMajor(e.target.value)} />
                            </div>
                        </div>
                    </div>

                    {active && (
                        <div style={{ background: C.card, padding: 20, borderRadius: 16, border: `1px solid ${C.border}` }}>
                            <div style={{ color: C.pink, fontSize: 13, fontWeight: 700, marginBottom: 15 }}>⏱️ 時機與位階判讀</div>
                            {foreign && <EntryTimingCard cost={foreign} price={price} label="外資" color={C.blue} />}
                            {trust && <EntryTimingCard cost={trust} price={price} label="投信" color={C.pink} />}
                            {major && <EntryTimingCard cost={major} price={price} label="主力" color={C.yellow} />}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
