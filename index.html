<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>發財 - Bunny Finance Lab 3.5</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0d11;
    --surface: #15181f;
    --card: #1c2029;
    --border: #2d323d;
    --accent-gold: #f5c842;
    --accent-purple: #b48eff;
    --accent-green: #4ade80; /* 支撐/買進 */
    --accent-red: #f87171;   /* 壓力/賣出 */
    --text-main: #f5f5f5;
    --text-muted: #8a8f9d;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text-main); font-family: 'Noto Sans TC', sans-serif; padding: 20px 15px 80px; }
  .app-header { text-align: center; margin-bottom: 20px; }
  .app-header h1 { font-size: 24px; font-weight: 900; background: linear-gradient(to right, #fff, var(--accent-gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .app-header p { font-size: 11px; color: var(--text-muted); letter-spacing: 1px; }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 20px; margin-bottom: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
  .card-title { font-size: 13px; font-weight: 700; color: var(--accent-gold); margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
  
  .input-label { display: block; font-size: 11px; color: var(--text-muted); margin-bottom: 6px; }
  input { background: #0b0d11; border: 1px solid var(--border); border-radius: 10px; color: var(--accent-gold); font-family: 'DM Mono', monospace; font-size: 16px; padding: 12px; width: 100%; outline: none; transition: 0.3s; }
  input:focus { border-color: var(--accent-gold); box-shadow: 0 0 10px rgba(245,200,66,0.1); }
  
  .btn-fetch { width: 100%; background: #1a1e26; border: 1px dashed var(--accent-gold); border-radius: 12px; color: var(--accent-gold); padding: 12px; font-size: 13px; font-weight: 700; cursor: pointer; margin: 15px 0; transition: 0.3s; }
  .btn-analyze { width: 100%; background: linear-gradient(135deg, #f5c842, #d4a72d); border: none; border-radius: 14px; color: #000; padding: 16px; font-size: 16px; font-weight: 900; letter-spacing: 2px; cursor: pointer; }

  .status-box { text-align: center; padding: 25px; border-radius: 20px; border: 1px solid var(--accent-gold); background: radial-gradient(circle at top, #252a36, #1c2029); margin-bottom: 20px; }
  
  .score-circle {
    width: 80px; height: 80px; 
    border: 4px solid var(--accent-gold); 
    border-radius: 50%; 
    display: flex; align-items: center; justify-content: center; 
    font-size: 28px; font-weight: 900; 
    margin: 0 auto 15px;
    background: rgba(255,255,255,0.05);
    box-shadow: 0 0 15px rgba(245,200,66,0.2);
  }

  .report-desc { text-align: left; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; margin-top: 15px; font-size: 13px; line-height: 1.6; color: var(--text-main); }
  .strat-info { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); font-size: 12px; color: var(--accent-gold); font-weight: bold; }

  /* 買綠賣紅：修正背景與邊框顏色 */
  .row-buy-active { background: rgba(74, 222, 128, 0.15) !important; border-left: 4px solid var(--accent-green) !important; }
  .row-sell-active { background: rgba(248, 113, 113, 0.15) !important; border-left: 4px solid var(--accent-red) !important; }

  .fib-table { width: 100%; border-collapse: collapse; font-family: 'DM Mono', monospace; font-size: 13px; }
  .fib-table tr { border-bottom: 1px solid var(--border); }
  .fib-table td { padding: 14px 8px; vertical-align: middle; }
  .price-text { font-weight: 700; color: var(--text-main); }
  
  .target-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; text-align: center; }
  .target-item { background: #0b0d11; padding: 12px 5px; border-radius: 12px; border: 1px solid var(--border); }
  .target-label { font-size: 10px; color: var(--text-muted); margin-bottom: 4px; }
  .target-val { font-size: 14px; font-weight: 700; color: var(--accent-gold); }

  .strat-tag { font-size: 9px; padding: 2px 6px; border-radius: 4px; display: inline-block; margin-top: 4px; font-weight: bold; }
  .tag-entry { background: rgba(74, 222, 128, 0.2); color: var(--accent-green); border: 0.5px solid var(--accent-green); }
  .tag-exit { background: rgba(248, 113, 113, 0.2); color: var(--accent-red); border: 0.5px solid var(--accent-red); }
  .tag-hold { background: rgba(245,200,66,0.15); color: #f5c842; border: 0.5px solid #f5c842; }
</style>
</head>
<body>

<div class="app-header">
  <p>BUNNY FINANCE LAB PROFESSIONAL</p>
  <h1>法人波浪精算 3.5</h1>
</div>

<div class="card">
  <div class="card-title">📡 數據自動抓取 (FinMind 介接)</div>
  <label class="input-label">股票代號 (如: 2330)</label>
  <input type="text" id="ticker" placeholder="輸入 4 位台股代號">
  
  <button class="btn-fetch" id="btnFetch" onclick="fetchFinMindData()">📡 啟動專業 API 數據同步</button>

  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
    <div><label class="input-label">當前現價</label><input type="number" id="price" step="0.01"></div>
    <div><label class="input-label">法人成本</label><input type="number" id="cost" step="0.01" placeholder="填入成本"></div>
  </div>
  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 12px;">
    <div><label class="input-label">區間低點 (3個月)</label><input type="number" id="low" step="0.01"></div>
    <div><label class="input-label">區間高點 (3個月)</label><input type="number" id="high" step="0.01"></div>
  </div>

  <button class="btn-analyze" style="margin-top:20px;" onclick="runAnalysis()">🧧 開始精算</button>
</div>

<div id="analysisResult" style="display:none;">
  <div class="status-box" id="statusBox"></div>

  <div class="card">
    <div class="card-title">📐 斐波那契 (買綠賣紅)</div>
    <table class="fib-table" id="fibTable"></table>
  </div>

  <div class="card">
    <div class="card-title">🌊 法人成本擴展目標</div>
    <div class="target-grid" id="waveTargets"></div>
  </div>
</div>

<script>
const FINMIND_TOKEN = "eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJ1c2VyX2lkIjoiaHVhbmc4MDY3NiIsImVtYWlsIjoidzgwMDY3NkBnbWFpbC5jb20ifQ.k7BlAxav_GxT_tchaXAyuDafq_hIV01eUSzk2H_cZBQ";

async function fetchFinMindData() {
    const ticker = document.getElementById('ticker').value.trim();
    if (!ticker) return alert('請輸入股票代號');
    const btn = document.getElementById('btnFetch');
    btn.textContent = '🚀 數據同步中...';
    const endDate = new Date().toISOString().split('T')[0];
    const startDate = new Date(new Date().setDate(new Date().getDate() - 90)).toISOString().split('T')[0];

    try {
        const url = `https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockPrice&data_id=${ticker}&start_date=${startDate}&end_date=${endDate}&token=${FINMIND_TOKEN}`;
        const response = await fetch(url);
        const json = await response.json();
        if (!json.data || json.data.length === 0) throw new Error('查無數據');
        const data = json.data;
        document.getElementById('price').value = data[data.length - 1].close;
        document.getElementById('high').value = Math.max(...data.map(d => d.max)).toFixed(2);
        document.getElementById('low').value = Math.min(...data.map(d => d.min)).toFixed(2);
        btn.textContent = '✅ 同步成功';
    } catch (e) {
        alert('抓取失敗');
        btn.textContent = '❌ 同步失敗';
    }
}

function runAnalysis() {
    const p = parseFloat(document.getElementById('price').value);
    const hi = parseFloat(document.getElementById('high').value);
    const lo = parseFloat(document.getElementById('low').value);
    const cost = parseFloat(document.getElementById('cost').value);
    if (!p || !hi || !lo) return alert('數據不足');

    document.getElementById('analysisResult').style.display = 'block';
    const range = hi - lo;

    // 位階定義：買綠（低位）賣紅（高位）
    const fibRatios = [
        { r: 1.618, l: "末升段", role: "終極目標區", strat: "全數獲利", tag: "tag-exit", type: "sell" },
        { r: 1.382, l: "魚尾段", role: "擴展滿足點", strat: "分批停利", tag: "tag-exit", type: "sell" },
        { r: 1.272, l: "噴發位", role: "初步擴展區", strat: "壓力觀察", tag: "tag-exit", type: "sell" },
        { r: 1.0,   l: "前高點", role: "關鍵壓力位", strat: "高位減碼", tag: "tag-exit", type: "sell" },
        { r: 0.786, l: "轉折位", role: "魚身轉魚尾", strat: "高位減碼", tag: "tag-exit", type: "sell" },
        { r: 0.618, l: "主升段", role: "法人護盤區", strat: "波段買點", tag: "tag-entry", type: "buy" },
        { r: 0.5,   l: "魚頭段", role: "多空起漲點", strat: "初步佈局", tag: "tag-entry", type: "buy" },
        { r: 0.382, l: "強勢位", role: "回測支撐點", strat: "分批佈局", tag: "tag-entry", type: "buy" },
        { r: 0,     l: "起步位", role: "強力支撐", strat: "起漲防守", tag: "tag-hold", type: "buy" }
    ];

    let fibHTML = "";
    let mainSignal = "波段佈局中";
    let signalColor = "var(--accent-gold)";
    let hitAny = false;

    fibRatios.forEach(f => {
        const val = lo + range * f.r;
        const isNear = Math.abs(p - val) / val < 0.02;
        let rowClass = "";
        if (isNear) {
            // 修正：買綠賣紅的視覺點亮
            rowClass = f.type === "buy" ? "row-buy-active" : "row-sell-active";
            mainSignal = f.type === "buy" ? "🎯 進入黃金買點區" : "🚀 到達目標壓力區";
            signalColor = f.type === "buy" ? "var(--accent-green)" : "var(--accent-red)";
            hitAny = true;
        }
        fibHTML += `<tr class="${rowClass}"><td><span style="font-size:10px; color:var(--text-muted)">${f.l} (${f.r})</span><br><b>${f.role}</b><br><span class="strat-tag ${f.tag}">${f.strat}</span></td><td class="price-text">$${val.toFixed(2)}</td><td style="text-align:right; font-size:11px; color:${isNear ? 'inherit' : (p > val ? 'var(--accent-red)' : 'var(--accent-green)')}">${isNear ? '🎯 點亮' : (p > val ? '▲ 支撐' : '▼ 壓力')}</td></tr>`;
    });
    document.getElementById('fibTable').innerHTML = fibHTML;

    // --- 嚴格評分標準 ---
    let score = 40; 
    let stratText = "";
    const isStrongZone = p > (lo + range * 0.618);
    const isAboveMid = p > (lo + range * 0.5);
    const isProfitable = cost && p > (cost * 1.04);
    const isBreakHigh = p > hi;

    if (isStrongZone) { score += 20; } 
    if (isProfitable) { score += 20; }
    if (isBreakHigh) { score += 20; }
    score = Math.min(100, score);

    if (score >= 90) {
        stratText = "💎 極致格局：突破前高且獲利穩健，建議賣紅不追高，分批落袋。";
    } else if (score >= 70) {
        stratText = "✨ 穩健格局：站穩 0.618 主升段，多頭趨勢明顯，未達壓力前續抱。";
    } else if (score >= 50) {
        stratText = "⏳ 觀察格局：股價於 0.5 附近徘徊，買綠佈局應守住 0.382 支撐位。";
    } else {
        stratText = "⚠️ 警訊格局：弱勢整理，僅適合在綠色支撐區嘗試極小量防守性佈局。";
    }

    document.getElementById('statusBox').innerHTML = `
        <div class="score-circle" style="border-color:${signalColor}; color:${signalColor}">${score}</div>
        <div style="font-size:22px; font-weight:900; color:${signalColor}; margin-bottom:10px;">${mainSignal}</div>
        <div class="report-desc">
            目前股價位於「${isAboveMid ? '多方區間' : '空方整理'}」之 ${isStrongZone ? '強勢位' : '弱勢位'}。
            ${hitAny ? '偵測到關鍵位階訊號，請參考表格內點亮之策略建議。' : '目前尚未觸及核心位階點亮。'}
            <div class="strat-info">📢 進出場策略建議（買綠賣紅）：<br>${stratText}</div>
        </div>`;

    if (cost) {
        document.getElementById('waveTargets').innerHTML = `
            <div class="target-item"><div class="target-label">脫離成本</div><div class="target-val">$${(cost * 1.04).toFixed(2)}</div></div>
            <div class="target-item"><div class="target-label">波段目標</div><div class="target-val" style="color:var(--accent-purple)">$${(cost * 1.2).toFixed(2)}</div></div>
            <div class="target-item"><div class="target-label">翻倍擴展</div><div class="target-val" style="color:var(--accent-red)">$${(cost * 1.4).toFixed(2)}</div></div>`;
    } else {
        document.getElementById('waveTargets').innerHTML = '<p style="color:var(--text-muted); font-size:12px; grid-column: 1/4;">請填入法人成本計算波段目標</p>';
    }
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}
</script>
</body>
</html>
