<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>發財強勢股精算系統｜Fortune Pro</title>
<style>
:root {
  --bg:#0d0f14; --surface:#161921; --card:#1c2030; --border:#3d341a;
  --gold:#f5c842; --gold-light:#fff3ad; --green:#4ade80; --red:#f87171;
  --text:#f5eec8; --muted:#857f61; --dim:#a39e7e;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;min-height:100vh;padding:20px 16px 60px;}
.header{text-align:center;margin-bottom:28px;}
.tag{display:inline-block;font-size:11px;letter-spacing:3px;color:var(--gold);border:1px solid var(--gold);padding:4px 12px;border-radius:20px;margin-bottom:10px;text-transform:uppercase;}
h1{font-size:28px;font-weight:900;background:linear-gradient(135deg,#fff,var(--gold),#ff9d4d);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px;}
.section{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:14px;box-shadow: 0 4px 20px rgba(0,0,0,0.3);}
.section-title{font-size:13px;font-weight:700;color:var(--gold);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.section-title::after{content:'';flex:1;height:1px;background:var(--border);}
.input-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.input-group{display:flex;flex-direction:column;gap:5px;}
.input-group label{font-size:11px;color:var(--muted);}
input{background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--gold);font-family:monospace;font-size:15px;padding:12px;outline:none;width:100%;}
input:focus{border-color:var(--gold);}
.btn-auto{width:100%;background:var(--surface);border:1px solid var(--gold)55;border-radius:12px;color:var(--gold);font-size:14px;font-weight:700;padding:14px;cursor:pointer;margin-top:10px;display:flex;justify-content:center;align-items:center;gap:10px;}
.btn-main{width:100%;background:linear-gradient(135deg,var(--gold),#ff9d4d);border:none;border-radius:14px;color:#000;font-size:16px;font-weight:900;padding:18px;cursor:pointer;margin-top:6px;letter-spacing:2px;box-shadow: 0 4px 15px rgba(245,200,66,0.3);}
.fib-table{width:100%;border-collapse:separate;border-spacing:0 4px;font-family:monospace;font-size:12px;}
.fib-table td{padding:12px 10px;background:var(--surface);}
.signal-box{padding:15px;border-radius:12px;margin-top:10px;font-size:14px;font-weight:700;text-align:center;line-height:1.5;}
.buy{background:rgba(74,222,128,0.1);color:var(--green);border:1px solid var(--green);}
.sell{background:rgba(248,113,113,0.1);color:var(--red);border:1px solid var(--red);}
.wait{background:rgba(245,200,66,0.05);color:var(--gold);border:1px solid var(--gold);}
#results{display:none;}
.loading { animation: pulse 1.5s infinite; opacity: 0.6; }
@keyframes pulse { 50% { opacity: 0.3; } }
</style>
</head>
<body>

<div class="header">
  <div class="tag">Fortune System</div>
  <h1>發財強勢股精算系統</h1>
  <p style="color:var(--muted); font-size:12px;">斐波那契共振 × 法人波浪精算</p>
</div>

<div class="section">
  <div class="section-title">📡 數據抓取</div>
  <div class="input-group">
    <label>股票代號 (台股請加 .TW)</label>
    <input type="text" id="ticker" placeholder="例如：3481.TW" style="text-transform:uppercase">
  </div>
  <button class="btn-auto" id="btnAuto" onclick="fetchStockData()">
    <span id="btnIcon">📡</span> <span id="btnText">抓取近 90 天高低點</span>
  </button>
  <p id="errorMsg" style="color:var(--red); font-size:11px; margin-top:8px; display:none;">⚠️ 抓取失敗，請檢查代號或改手動輸入價格。</p>
</div>

<div class="section">
  <div class="section-title">📊 核心價格數據</div>
  <div class="input-grid" style="margin-bottom:12px;">
    <div class="input-group"><label>當前現價</label><input type="number" id="price" step="0.01"></div>
    <div class="input-group"><label>波段低點</label><input type="number" id="fibLow" step="0.01"></div>
    <div class="input-group" style="grid-column: span 2;"><label>波段高點</label><input type="number" id="fibHigh" step="0.01"></div>
  </div>
  <div class="input-grid">
    <div class="input-group"><label>外資成本</label><input type="number" id="foreign" step="0.01"></div>
    <div class="input-group"><label>投信成本</label><input type="number" id="trust" step="0.01"></div>
  </div>
</div>

<button class="btn-main" onclick="runAnalysis()">🧧 開始發財精算</button>

<div id="results">
  <div class="section">
    <div class="section-title">📐 斐波那契位階（判斷共振）</div>
    <table class="fib-table" id="fibTable"></table>
  </div>

  <div class="section" id="waveOutput"></div>
</div>

<script>
async function fetchStockData() {
    const ticker = document.getElementById('ticker').value.trim().toUpperCase();
    if (!ticker) return alert('請輸入代號');
    
    const btn = document.getElementById('btnAuto');
    const txt = document.getElementById('btnText');
    const err = document.getElementById('errorMsg');
    
    btn.classList.add('loading');
    txt.textContent = '數據傳輸中...';
    err.style.display = 'none';

    try {
        const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=3mo`)}`);
        const json = await res.json();
        const data = JSON.parse(json.contents);
        
        const result = data.chart.result[0];
        const quote = result.indicators.quote[0];
        const closes = quote.close.filter(v => v != null);
        const highs = quote.high.filter(v => v != null);
        const lows = quote.low.filter(v => v != null);

        document.getElementById('price').value = closes[closes.length-1].toFixed(2);
        document.getElementById('fibHigh').value = Math.max(...highs).toFixed(2);
        document.getElementById('fibLow').value = Math.min(...lows).toFixed(2);
        
        txt.textContent = '✅ 抓取成功';
        setTimeout(() => { txt.textContent = '抓取近 90 天高低點'; }, 2000);
    } catch (e) {
        err.style.display = 'block';
        txt.textContent = '抓取失敗';
    } finally {
        btn.classList.remove('loading');
    }
}

function runAnalysis() {
    const price = parseFloat(document.getElementById('price').value);
    const hi = parseFloat(document.getElementById('fibHigh').value);
    const lo = parseFloat(document.getElementById('fibLow').value);
    const fCost = parseFloat(document.getElementById('foreign').value) || 0;
    const tCost = parseFloat(document.getElementById('trust').value) || 0;

    if (!price || !hi || !lo) return alert('請確保現價、高低點已填入');
    document.getElementById('results').style.display = 'block';

    const range = hi - lo;
    const levels = [
        {r: 0, l: '起漲低點'}, {r: 0.236, l: '初步支撐'}, {r: 0.382, l: '強勢回調'},
        {r: 0.5, l: '多空分界'}, {r: 0.618, l: '黃金分割'}, {r: 0.786, l: '深層回測'},
        {r: 1, l: '波段高點'}, {r: 1.382, l: '多頭延伸'}, {r: 1.618, l: '噴發目標'}
    ];
    
    // 1. 斐波那契渲染
    let fibHTML = `<tr><th>位階</th><th>價格</th><th>判定</th></tr>`;
    levels.forEach(lvl => {
        const p = +(lo + range * lvl.r).toFixed(2);
        const isNear = Math.abs(price - p) / price < 0.015;
        fibHTML += `<tr>
            <td style="color:var(--gold)">${lvl.l} (${(lvl.r*100).toFixed(1)}%)</td>
            <td>$${p}</td>
            <td style="color:${isNear?'var(--green)':'var(--dim)'}">${isNear?'⭐共振中':'--'}</td>
        </tr>`;
    });
    document.getElementById('fibTable').innerHTML = fibHTML;

    // 2. 波浪進出場判定 (1.04/1.2/1.4/1.7)
    const mainCost = tCost || fCost;
    let waveHTML = `<div class="section-title">🌊 波浪發財信號</div>`;
    
    if (mainCost) {
        const bP = (mainCost * 1.04).toFixed(2);
        const t1 = (mainCost * 1.2).toFixed(2);
        const t2 = (mainCost * 1.4).toFixed(2);
        
        let signal = { cls: 'wait', msg: '尚未抵達爆發點，建議觀望。' };
        if (price >= bP && price < t1) signal = { cls: 'buy', msg: `🚀 突破 1.04 成本 ($${bP})！進場信號確認。` };
        else if (price >= t1 && price < t2) signal = { cls: 'wait', msg: `📈 抵達 1.2 獲利區 ($${t1})，持股續抱。` };
        else if (price >= t2) signal = { cls: 'sell', msg: `💰 抵達 1.4 滿足位 ($${t2})，建議獲利落袋。` };

        waveHTML += `<div class="signal-box ${signal.cls}">${signal.msg}</div>
            <div style="font-size:12px; margin-top:12px; color:var(--dim); line-height:1.8;">
                • 法人成本：$${mainCost}<br>
                • 啟動點(1.04)：$${bP}<br>
                • 第一目標(1.2)：$${t1} / 第二目標(1.4)：$${t2}
            </div>`;
    } else {
        waveHTML += `<div class="signal-box wait">請輸入法人成本以觸發波浪判斷</div>`;
    }
    document.getElementById('waveOutput').innerHTML = waveHTML;
    
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}
</script>
</body>
</html>
